<script>"use strict";var Spira=(()=>{var tp=Object.create;var Qn=Object.defineProperty;var rp=Object.getOwnPropertyDescriptor;var np=Object.getOwnPropertyNames;var ip=Object.getPrototypeOf,ap=Object.prototype.hasOwnProperty;var ie=(e,t)=>()=>(e&&(t=e(e=0)),t);var Nt=(e,t)=>()=>(t||e((t={exports:{}}).exports,t),t.exports),Pt=(e,t)=>{for(var r in t)Qn(e,r,{get:t[r],enumerable:!0})},Ko=(e,t,r,i)=>{if(t&&typeof t=="object"||typeof t=="function")for(let a of np(t))!ap.call(e,a)&&a!==r&&Qn(e,a,{get:()=>t[a],enumerable:!(i=rp(t,a))||i.enumerable});return e};var op=(e,t,r)=>(r=e!=null?tp(ip(e)):{},Ko(t||!e||!e.__esModule?Qn(r,"default",{value:e,enumerable:!0}):r,e)),Vo=e=>Ko(Qn({},"__esModule",{value:!0}),e);var Xo,Yo=ie(()=>{Xo=`/* =========================================================
 * Spira \u2014 App CSS
 * 1. Design tokens (CSS variables)
 * 2. Layout (overlay / shell / sidebar / main)
 * 3. Components (button / badge / modal / menu / toast / input)
 * 4. Views (ticket list / detail / inbox / trash)
 * 5. States (loading / empty / error)
 * ========================================================= */

/* ---------- 1. Design tokens ---------- */
.spira-root {
  /* shield from SP host: must come first so explicit values override */
  all: initial;

  /* text */
  --ink:           #2a2a26;
  --ink-3:         #7a766c;
  --ink-4:         #a8a39a;

  /* surface */
  --paper:         #fafaf7;
  --paper-2:       #f3f1ea;
  --paper-2-strong:#ece8de;
  --paper-3:       #e8e4d8;

  /* line */
  --line:          rgba(42, 42, 38, 0.12);
  --line-strong:   rgba(42, 42, 38, 0.18);

  /* accent \u2014 moss green */
  --accent:        #7a8a78;
  --accent-soft:   rgba(122, 138, 120, 0.18);
  --accent-strong: #5e6f5c;

  /* status */
  --danger:        #b8534a;
  --danger-soft:   rgba(184, 83, 74, 0.12);
  --warn:          #c47f1c;
  --warn-soft:     rgba(196, 127, 28, 0.14);
  --ok:            #2f6f5e;
  --ok-soft:       rgba(47, 111, 94, 0.12);
  --hl:            rgba(196, 174, 96, 0.35);

  /* type */
  --font-sans: "Meiryo", "\u30E1\u30A4\u30EA\u30AA", "Hiragino Sans", "Yu Gothic UI",
               -apple-system, "Segoe UI", system-ui, sans-serif;
  --font-mono: ui-monospace, "Cascadia Mono", "Consolas", monospace;

  --fs-xs:   11px;
  --fs-sm:   12px;
  --fs-md:   13px;
  --fs-base: 15px;
  --fs-lg:   16px;
  --fs-xl:   18px;
  --fs-h3:   22px;
  --fs-h2:   28px;
  --fs-h1:   36px;
}
/* \u6587\u5B57\u30B5\u30A4\u30BA\u30B9\u30B1\u30FC\u30EB \u2014 \u8A2D\u5B9A \u2192 \u8868\u793A \u2192 \u6587\u5B57\u30B5\u30A4\u30BA \u3067\u5207\u308A\u66FF\u3048\u3002
   \u65E2\u5B9A (\u4E2D) \u306F\u4E0A\u306E\u5024\u3001data-font-size \u5C5E\u6027\u3067\u4E0A\u66F8\u304D\u3059\u308B\u3002 */
.spira-root[data-font-size="sm"] {
  --fs-xs:   10px;
  --fs-sm:   11px;
  --fs-md:   12px;
  --fs-base: 13px;
  --fs-lg:   14px;
  --fs-xl:   16px;
  --fs-h3:   19px;
  --fs-h2:   24px;
  --fs-h1:   30px;
}
.spira-root[data-font-size="lg"] {
  --fs-xs:   13px;
  --fs-sm:   14px;
  --fs-md:   15px;
  --fs-base: 17px;
  --fs-lg:   19px;
  --fs-xl:   22px;
  --fs-h3:   26px;
  --fs-h2:   32px;
  --fs-h1:   40px;
}
.spira-root {
  /* \u4E0A\u306E\u30B9\u30B1\u30FC\u30EB\u5BA3\u8A00\u3067 \`}\` \u3092\u51FA\u3057\u3066\u3057\u307E\u3063\u305F\u306E\u3067\u7A7A\u30D6\u30ED\u30C3\u30AF\u3067\u672C\u6765\u306E token \u3092\u7D99\u7D9A\u3002
     (CSS \u306E cascade \u7684\u306B\u306F\u5148\u306E\u5BA3\u8A00\u304C\u6D3B\u304D\u308B\u306E\u3067\u554F\u984C\u306A\u3057) */

  --lh-base:  1.75;
  --lh-tight: 1.35;

  /* spacing (4px base) */
  --s-1:  4px;  --s-2:  6px;  --s-3:  8px;  --s-4:  10px; --s-5:  12px;
  --s-6:  14px; --s-7:  18px; --s-8:  22px; --s-9:  28px; --s-10: 40px;

  /* radius */
  --r-1: 2px; --r-2: 4px; --r-3: 6px; --r-4: 8px;

  /* shadow (warm, no blue) */
  --shadow-flyout: 0 12px 30px rgba(42, 42, 38, 0.14);
  --shadow-panel:  0 8px  20px rgba(42, 42, 38, 0.10);
  --shadow-modal:  0 0 0 1px rgba(42, 42, 38, 0.06),
                   0 4px  12px rgba(42, 42, 38, 0.10),
                   0 16px 40px rgba(42, 42, 38, 0.18);

  /* chrome */
  --topbar-h:  44px;
  --side-w:    200px;
  --toolbar-h: 38px;

  /* horizontal gutter \u2014 single source of truth for "where content starts inside main"
     so toolbar / subbar / tabs / table / detail header all line up with breathing room */
  --gutter: 16px;

  /* z */
  --z-overlay: 2147483600;
  --z-modal:   2147483700;
  --z-toast:   2147483800;

  /* base typography (must be after \`all: initial\`) */
  font-family: var(--font-sans);
  font-size:   var(--fs-base);
  line-height: var(--lh-base);
  color:       var(--ink);
  -webkit-font-smoothing: antialiased;
}

.spira-root,
.spira-root *,
.spira-root *::before,
.spira-root *::after { box-sizing: border-box; }

/* Reset known SP/host CSS bleed-through on descendants. */
.spira-root a {
  color: inherit;
  text-decoration: none;
  background: transparent;
}
.spira-root .spira-th-card-body a {
  color: var(--accent-strong);
  text-decoration: underline;
}
.spira-root button,
.spira-root input,
.spira-root select,
.spira-root textarea {
  font: inherit;
  color: inherit;
  margin: 0;
}
.spira-root p,
.spira-root h1,
.spira-root h2,
.spira-root h3,
.spira-root h4,
.spira-root h5,
.spira-root h6,
.spira-root ul,
.spira-root ol,
.spira-root figure,
.spira-root pre {
  margin: 0;
}
.spira-root img { max-width: 100%; height: auto; }
.spira-root table { border-collapse: collapse; }

.spira-root[data-theme="dark"] {
  --ink:            #e8e4d8;
  --ink-3:          #a8a39a;
  --ink-4:          #7a766c;
  --paper:          #1d1b18;
  --paper-2:        #25231f;
  --paper-2-strong: #2c2a25;
  --paper-3:        #3a3731;
  --line:           rgba(232, 228, 216, 0.14);
  --line-strong:    rgba(232, 228, 216, 0.22);
}

@media (prefers-reduced-motion: reduce) {
  .spira-root * {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

/* ---------- 2. Overlay & Shell ---------- */
.spira-root {
  position: fixed;
  inset: 0;
  z-index: var(--z-overlay);
  display: flex;
  background: var(--paper);
}

.spira-shell {
  display: flex;
  flex-direction: column;
  width: 100%;
  height: 100%;
}

.spira-topbar {
  height: var(--topbar-h);
  display: flex;
  align-items: center;
  gap: var(--s-5);
  padding: 0 var(--s-7);
  background: var(--paper);
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}

.spira-topbar-brand {
  display: inline-flex;
  align-items: center;
  gap: var(--s-3);
  font-weight: 600;
  font-size: var(--fs-md);
  color: var(--ink);
}

.spira-topbar-brand::before {
  content: "";
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--accent);
  display: inline-block;
}

.spira-topbar-spacer { flex: 1; }

.spira-topbar-actions {
  display: inline-flex;
  align-items: center;
  gap: var(--s-2);
}

.spira-topbar-actions .spira-iconbtn { color: var(--ink-3); }

.spira-body {
  display: flex;
  flex: 1;
  min-height: 0;
  background: var(--paper);
}

.spira-side {
  width: var(--side-w);
  background: var(--paper-2);
  border-right: 1px solid var(--line);
  padding: var(--s-5) var(--s-3);
  display: flex;
  flex-direction: column;
  gap: var(--s-5);
  flex-shrink: 0;
}

.spira-side-group { display: flex; flex-direction: column; gap: var(--s-1); }
.spira-side-group-title {
  font-size: var(--fs-xs);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-3);
  padding: 0 var(--s-3);
  margin-bottom: var(--s-1);
}
.spira-side-item {
  display: flex;
  align-items: center;
  gap: var(--s-3);
  height: 30px;
  padding: 0 var(--s-3);
  border-radius: var(--r-2);
  cursor: pointer;
  font-size: var(--fs-md);
  color: var(--ink);
  border-left: 2px solid transparent;
  user-select: none;
}
.spira-side-item:hover { background: var(--paper-2-strong); }
.spira-side-item.active {
  background: var(--accent-soft);
  border-left-color: var(--accent);
  color: var(--accent-strong);
  font-weight: 500;
}
.spira-side-item .spira-side-count {
  margin-left: auto;
  font-size: var(--fs-xs);
  color: var(--ink-3);
  background: var(--paper-3);
  padding: 1px var(--s-2);
  border-radius: 99px;
}
.spira-side-bottom { margin-top: auto; }

.spira-main {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  background: var(--paper);
}

#spira-root .spira-toolbar {
  height: var(--toolbar-h) !important;
  display: flex !important;
  align-items: center !important;
  gap: var(--s-3) !important;
  padding-left: var(--gutter) !important;
  padding-right: var(--gutter) !important;
  padding-top: 0 !important;
  padding-bottom: 0 !important;
  border-bottom: 1px solid var(--line) !important;
  flex-shrink: 0 !important;
  background: var(--paper) !important;
}

/* Single rule that enforces the horizontal gutter on every main-area container.
 * This is the contract \u2014 anything that lives directly under .spira-main and shows
 * text/buttons must use this gutter, NOT inline padding. */
#spira-root .spira-toolbar,
#spira-root .spira-subbar,
#spira-root .spira-tab-strip,
#spira-root .spira-table-wrap,
#spira-root .spira-detail-hd-wrap,
#spira-root .spira-error-banner {
  padding-left: var(--gutter) !important;
  padding-right: var(--gutter) !important;
}
.spira-toolbar-spacer { flex: 1; }

.spira-content {
  flex: 1;
  min-height: 0;
  overflow: auto;
  padding: var(--s-7);
}

/* ---------- 3. Components ---------- */
/* Button.
 * SharePoint host injects very aggressive button styles (Fluent UI / m365 chrome)
 * that override our colors via element selectors and !important. We use !important
 * here as well \u2014 this is the documented escape hatch for namespaced overlays.
 * The color is also applied to children so SP's icon-stack rules can't recolor text.
 */
#spira-root .spira-btn,
#spira-root .spira-btn * {
  font-family: inherit !important;
  font-size: var(--fs-md) !important;
}
#spira-root .spira-btn {
  height: 34px !important;
  padding: 0 var(--s-7) !important;
  display: inline-flex !important;
  align-items: center !important;
  justify-content: center !important;
  gap: var(--s-2) !important;
  border-radius: var(--r-2) !important;
  font-weight: 500 !important;
  cursor: pointer !important;
  border: 1px solid var(--line-strong) !important;
  background: var(--paper) !important;
  color: var(--ink) !important;
  transition: background 0.1s, color 0.1s, border-color 0.1s, filter 0.1s !important;
  white-space: nowrap !important;
  text-decoration: none !important;
}
#spira-root .spira-btn:hover { filter: brightness(0.96) !important; }
#spira-root .spira-btn:focus-visible {
  outline: 2px solid var(--accent-soft) !important;
  outline-offset: 1px !important;
}
#spira-root .spira-btn:disabled { opacity: 0.5 !important; cursor: not-allowed !important; filter: none !important; }

#spira-root .spira-btn--primary,
#spira-root .spira-btn--primary * {
  background: var(--accent) !important;
  color: #ffffff !important;
  border-color: var(--accent) !important;
}
#spira-root .spira-btn--primary { background: var(--accent) !important; color: #ffffff !important; border-color: var(--accent) !important; }
#spira-root .spira-btn--primary:hover {
  background: var(--accent-strong) !important;
  border-color: var(--accent-strong) !important;
  color: #ffffff !important;
  filter: none !important;
}

#spira-root .spira-btn--dark,
#spira-root .spira-btn--dark * {
  background: var(--ink) !important;
  color: var(--paper) !important;
  border-color: var(--ink) !important;
}

#spira-root .spira-btn--secondary,
#spira-root .spira-btn--secondary * {
  background: var(--paper-2) !important;
  color: var(--ink) !important;
  border-color: var(--paper-3) !important;
}

#spira-root .spira-btn--ghost,
#spira-root .spira-btn--ghost * {
  background: transparent !important;
  color: var(--ink-3) !important;
}
/* Ghost: solid border (was dashed) so toolbar buttons look uniform with secondary/danger variants */
#spira-root .spira-btn--ghost { border: 1px solid var(--line-strong) !important; }
#spira-root .spira-btn--ghost:hover,
#spira-root .spira-btn--ghost:hover * {
  border-color: var(--ink-4) !important;
  color: var(--ink) !important;
  filter: none !important;
}

#spira-root .spira-btn--danger,
#spira-root .spira-btn--danger * {
  background: transparent !important;
  color: var(--danger) !important;
}
#spira-root .spira-btn--danger { border-color: var(--danger) !important; }

/* Inline icon-only action buttons used on each card / row.
 * Borderless + transparent so they blend into the card surface.
 * --icon-action: neutral (OWA \u3067\u691C\u7D22, \u7DE8\u96C6) \u2014 grey, gets accented on hover
 * --icon-trash:  destructive \u2014 solid red even at rest
 *
 * Padding is applied only to the button (not its descendants) so the
 * SVG icon span keeps its 14\xD714 footprint and stays visible. */
/* --icon-action: neutral (OWA \u3067\u691C\u7D22, \u7DE8\u96C6) \u2014 visible frame.
 * --icon-trash:  destructive \u2014 solid red frame.
 * Padding scoped to the button so SVG icons keep their 14\xD714 size. */
#spira-root .spira-btn--icon-action {
  background: var(--paper) !important;
  color: var(--ink-3) !important;
  border: 1px solid var(--line) !important;
  padding: 0 var(--s-3) !important;
}
#spira-root .spira-btn--icon-action * {
  background: transparent !important;
  color: var(--ink-3) !important;
}
#spira-root .spira-btn--icon-action:hover,
#spira-root .spira-btn--icon-action:hover * {
  background: var(--paper-2) !important;
  border-color: var(--line-strong) !important;
  color: var(--ink) !important;
  filter: none !important;
}

#spira-root .spira-btn--icon-trash {
  background: var(--paper) !important;
  color: #c0392b !important;
  border: 1px solid rgba(192, 57, 43, 0.4) !important;
  padding: 0 var(--s-3) !important;
}
#spira-root .spira-btn--icon-trash * {
  background: transparent !important;
  color: #c0392b !important;
}
#spira-root .spira-btn--icon-trash:hover,
#spira-root .spira-btn--icon-trash:hover * {
  background: rgba(192, 57, 43, 0.08) !important;
  border-color: #c0392b !important;
  color: #c0392b !important;
  filter: none !important;
}
#spira-root .spira-btn--danger:hover {
  background: var(--danger-soft) !important;
  color: var(--danger) !important;
  filter: none !important;
}

#spira-root .spira-btn--sm { height: 28px !important; padding: 0 var(--s-5) !important; font-size: var(--fs-sm) !important; }

/* Icon button (square) \u2014 also force-shielded from host CSS. */
#spira-root .spira-iconbtn {
  width: 30px !important; height: 30px !important;
  display: inline-flex !important; align-items: center !important; justify-content: center !important;
  border: none !important;
  background: transparent !important;
  border-radius: var(--r-2) !important;
  cursor: pointer !important;
  color: var(--ink) !important;
  padding: 0 !important;
}
#spira-root .spira-iconbtn:hover { background: var(--paper-2-strong) !important; }
#spira-root .spira-iconbtn:focus-visible { outline: 2px solid var(--accent-soft) !important; outline-offset: 1px !important; }
#spira-root .spira-iconbtn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.7; }

/* Input \u2014 borders are always visible so form fields read as "boxes"
 * even when not focused. Focus state just darkens the border slightly. */
.spira-input,
.spira-textarea,
.spira-select {
  width: 100%;
  font-family: inherit;
  font-size: var(--fs-md);
  color: var(--ink);
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--r-2);
  padding: 6px var(--s-3);
  line-height: var(--lh-tight);
}
.spira-input:hover,
.spira-textarea:hover,
.spira-select:hover { border-color: var(--line-strong); }
.spira-input:focus,
.spira-textarea:focus,
.spira-select:focus {
  outline: none;
  border-color: var(--line-strong);
  box-shadow: 0 0 0 2px var(--accent-soft);
}
.spira-input::placeholder,
.spira-textarea::placeholder { color: var(--ink-4); }

/* Datetime widget (createDateTime) \u2014 same chrome as .spira-input:
 * solid border at rest, darker border on focus-within. Padding matches
 * .spira-input so the YYYY segment's left edge lines up with the value
 * column of adjacent fields. */
.spira-dt-wrap {
  display: inline-flex;
  align-items: center;
  gap: 1px;
  border: 1px solid var(--line);
  border-radius: var(--r-2);
  padding: 6px var(--s-3);
  background: var(--paper);
  min-width: 0;
  position: relative;
  line-height: 1;
  cursor: text;
  transition: border-color 0.1s, box-shadow 0.1s;
}
.spira-dt-wrap:hover { border-color: var(--line-strong); }
.spira-dt-wrap:focus-within {
  border-color: var(--line-strong);
  box-shadow: 0 0 0 2px var(--accent-soft);
}

.spira-textarea {
  min-height: 72px;
  resize: vertical;
  line-height: 1.6;
  padding-bottom: 14px; /* default \u2014 give cursor room from the bottom edge */
}

.spira-input--inline {
  font-size: var(--fs-h3);
  font-weight: 600;
  padding: var(--s-1) var(--s-2);
}

.spira-search-wrap {
  position: relative;
  display: inline-flex;
  align-items: center;
  flex-shrink: 0;
}
.spira-search-wrap > span {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  width: 14px;
  height: 14px;
  color: var(--ink-4);
  pointer-events: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.spira-search-wrap > span svg {
  width: 14px;
  height: 14px;
  display: block;
}
#spira-root .spira-search-input,
.spira-search-input { padding-left: 32px; min-width: 220px; background: var(--paper-2); border-color: var(--paper-3); }

/* Badge */
.spira-badge {
  display: inline-flex;
  align-items: center;
  gap: var(--s-1);
  padding: 2px var(--s-3);
  border-radius: 99px;
  border: 1px solid var(--line-strong);
  background: var(--paper);
  color: var(--ink);
  font-size: var(--fs-sm);
  line-height: 1.2;
  white-space: nowrap;
}
.spira-badge--fill   { background: var(--accent); color: #fff; border-color: var(--accent); }
.spira-badge--ok     { background: var(--ok-soft); border-color: var(--ok); color: var(--ok); }
.spira-badge--warn   { background: var(--warn-soft); border-color: var(--warn); color: #5d3d0c; }
.spira-badge--danger { background: var(--danger-soft); border-color: var(--danger); color: var(--danger); }
.spira-badge--muted  { background: var(--paper-2); border-color: var(--paper-3); color: var(--ink-3); }
/* NEW badge \u2014 \u524D\u56DE\u8868\u793A\u6642\u4EE5\u964D\u306E\u65B0\u898F\u3002\u9752\u7CFB\u3067\u300C\u65B0\u898F\u53D7\u4FE1\u300D\u306E\u610F\u5473\u5408\u3044\u3002 */
.spira-badge--new {
  background: #3b82f6;   /* blue-500 */
  border-color: #3b82f6;
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.05em;
  padding: 1px 6px;
}

/* Priority label \u2014 colored text instead of a dot */
.spira-prio {
  display: inline-block;
  font-size: var(--fs-sm);
  font-weight: 600;
  letter-spacing: 0.02em;
  white-space: nowrap;
}
.spira-prio--high   { color: var(--danger); }
.spira-prio--medium { color: var(--warn); }
.spira-prio--low    { color: var(--ink-3); }

/* Avatar */
.spira-avatar {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: var(--fs-xs);
  font-weight: 600;
  flex-shrink: 0;
}
.spira-avatar--unset {
  background: transparent;
  border: 1px dashed var(--line-strong);
  color: var(--ink-4);
}
.spira-avatar--lg { width: 28px; height: 28px; font-size: var(--fs-sm); }

/* Modal */
.spira-modal-backdrop {
  position: fixed;
  inset: 0;
  z-index: var(--z-modal);
  background: rgba(15, 15, 15, 0.45);
  backdrop-filter: blur(2px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: var(--s-7);
}
.spira-modal {
  background: var(--paper);
  border: 1px solid var(--line-strong);
  border-radius: var(--r-3);
  box-shadow: var(--shadow-modal);
  padding: var(--s-7);
  width: 100%;
  max-width: 560px;
  max-height: calc(100vh - var(--s-10));
  overflow: auto;
}
.spira-modal--lg { max-width: 1000px; }
.spira-modal--xl {
  /* xl = \u30EA\u30B5\u30A4\u30BA\u53EF\u80FD\u306A\u5927\u578B\u30E2\u30FC\u30C0\u30EB (\u8A2D\u5B9A\u30CF\u30D6\u30FB\u6982\u8981)\u3002
     \u65E2\u5B9A\u306F viewport \u306E 2/3 \u7A0B\u5EA6\u3001\u53F3\u4E0B\u30C9\u30E9\u30C3\u30B0\u3067\u7E26\u6A2A\u81EA\u7531\u8ABF\u6574\u53EF\u80FD\u3002 */
  max-width: none;
  width:  min(1000px, calc((100vw - 80px) * 2 / 3));
  height: calc(100vh - 80px);
  min-width: 640px;
  min-height: 480px;
  padding: var(--s-5);
  resize: both;
  overflow: auto;
  display: flex;
  flex-direction: column;
}
.spira-modal--xl .spira-modal-body {
  flex: 1;
  min-height: 0;
  overflow: auto;
}
.spira-modal-header {
  display: flex;
  align-items: center;
  gap: var(--s-3);
  margin-bottom: var(--s-5);
}
.spira-modal-title {
  font-size: var(--fs-lg);
  font-weight: 600;
  color: var(--ink);
  margin: 0;
}
.spira-modal-body { font-size: var(--fs-md); color: var(--ink); }
.spira-modal-footer {
  display: flex;
  justify-content: flex-end;
  gap: var(--s-3);
  margin-top: var(--s-7);
}
.spira-modal-close { margin-left: auto; }

/* Field row in modal/form */
.spira-field {
  display: flex;
  flex-direction: column;
  gap: var(--s-2);
  margin-bottom: var(--s-5);
}
.spira-field-label {
  font-size: var(--fs-sm);
  color: var(--ink-3);
  font-weight: 500;
}

/* Menu (flyout) */
.spira-menu {
  background: var(--paper);
  border: 1px solid var(--paper-3);
  border-radius: var(--r-2);
  box-shadow: var(--shadow-flyout);
  padding: var(--s-1);
  min-width: 180px;
}
.spira-menu-item {
  display: flex;
  align-items: center;
  gap: var(--s-3);
  padding: var(--s-2) var(--s-3);
  border-radius: var(--r-2);
  font-size: var(--fs-md);
  color: var(--ink);
  cursor: pointer;
}
.spira-menu-item:hover { background: var(--paper-2); }
.spira-menu-divider { height: 1px; background: var(--paper-3); margin: var(--s-1) var(--s-2); }

/* Toast */
.spira-toast-stack {
  position: fixed;
  top: var(--s-7);
  right: var(--s-7);
  z-index: var(--z-toast);
  display: flex;
  flex-direction: column;
  gap: var(--s-3);
  pointer-events: none;
}
.spira-toast {
  background: var(--paper);
  border: 1px solid var(--line-strong);
  border-left: 3px solid var(--accent);
  border-radius: var(--r-3);
  box-shadow: var(--shadow-panel);
  padding: var(--s-4) var(--s-6);
  font-size: var(--fs-md);
  color: var(--ink);
  max-width: 360px;
  pointer-events: auto;
  animation: spira-toast-in 0.2s ease-out;
}
.spira-toast--error  { border-left-color: var(--danger); }
.spira-toast--warn   { border-left-color: var(--warn); }
.spira-toast--ok     { border-left-color: var(--ok); }
@keyframes spira-toast-in {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Error banner */
.spira-error-banner {
  background: var(--danger-soft);
  border-bottom: 1px solid var(--danger);
  color: var(--danger);
  padding: var(--s-3) var(--s-7);
  font-size: var(--fs-sm);
  display: flex;
  align-items: center;
  gap: var(--s-3);
}
.spira-error-banner-spacer { flex: 1; }

/* ---------- 4. Views ---------- */
/* Ticket list (dense table) */
.spira-tk-table {
  /* Natural width = sum of explicit col widths. No min-width:100% so the table
   * never redistributes col widths when one is resized: drag dx \u2192 col dx, exactly. */
  width: max-content;
  border-collapse: collapse;
  font-size: var(--fs-md);
  table-layout: fixed;
}
#spira-root .spira-table-wrap {
  overflow-x: auto;
}
#spira-root .spira-tk-table th,
#spira-root .spira-tk-table td {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Column resize grabber \u2014 sits on the right edge of each <th> */
#spira-root .spira-col-resize {
  position: absolute;
  top: 0; right: 0;
  width: 6px; height: 100%;
  cursor: col-resize;
  user-select: none;
  background: transparent;
  transition: background 0.1s;
  z-index: 2;
}
#spira-root .spira-col-resize:hover,
#spira-root .spira-col-resize.dragging {
  background: var(--accent-soft);
}
.spira-tk-table th {
  text-align: left;
  font-weight: 400;
  font-size: var(--fs-xs);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--ink-3);
  padding: var(--s-3) var(--s-4);
  border-bottom: 1px solid var(--line);
  background: var(--paper);
  position: sticky;
  top: 0;
  z-index: 1;
}
.spira-tk-table th.spira-th-sort:hover { background: var(--paper-2); color: var(--ink); }
.spira-tk-table th.spira-th-sort.active { color: var(--accent-strong); font-weight: 600; }
.spira-tk-table td {
  padding: var(--s-4);
  border-bottom: 1px solid var(--paper-3);
  color: var(--ink);
  vertical-align: middle;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.spira-tk-table tr { cursor: pointer; }
.spira-tk-table tr:hover td { background: var(--paper-2); }
.spira-tk-row.active td { background: var(--accent-soft); }
.spira-tk-row.selected td { background: var(--accent-soft); }
/* Closed (= \u5B8C\u4E86) tickets: \u5168\u4F53\u30B0\u30EC\u30FC\u30A2\u30A6\u30C8\u3002\u65E5\u6570\u8868\u793A\u3082 updatedAt \u57FA\u6E96\u3067\u51CD\u7D50\u3059\u308B\u3002 */
#spira-root tr.spira-tk-row--closed td { color: var(--ink-3); opacity: 0.62; }
#spira-root tr.spira-tk-row--closed:hover td { opacity: 0.85; }
/* Hidden inbox row: greyed out so the user can tell it's currently filtered-out */
#spira-root tr.spira-row-hidden td { opacity: 0.55; }
#spira-root tr.spira-row-hidden:hover td { opacity: 0.85; }
.spira-tk-checkbox-cell { padding: var(--s-3) var(--s-4); cursor: default; }
.spira-tk-checkbox-cell input[type="checkbox"] { cursor: pointer; }
.spira-inbox-table tr.spira-inbox-expanded { cursor: default; }
.spira-inbox-table tr.spira-inbox-expanded:hover td { background: var(--paper-2); }

/* Sub-bar (always-present): view title on the left, optional bulk actions on the right.
 * Always rendered with the same height so the layout doesn't shift when items are selected.
 * !important everywhere to defeat SP host's div padding/margin resets. */
#spira-root .spira-subbar {
  display: flex !important;
  align-items: center !important;
  gap: var(--s-3) !important;
  padding-top: var(--s-4) !important;
  padding-bottom: var(--s-4) !important;
  /* horizontal padding intentionally NOT set here \u2014 the unified --gutter rule above wins */
  border-bottom: 1px solid var(--line) !important;
  background: var(--paper) !important;
  min-height: 48px !important;
  flex-shrink: 0 !important;
  transition: background 0.15s, border-color 0.15s !important;
}
#spira-root .spira-subbar.selected {
  background: var(--accent-soft) !important;
  border-color: var(--accent) !important;
}
#spira-root .spira-subbar-title {
  display: flex !important;
  align-items: baseline !important;
  gap: var(--s-4) !important;
}
#spira-root .spira-subbar-name {
  font-size: var(--fs-base) !important;
  font-weight: 600 !important;
  color: var(--ink) !important;
}
#spira-root .spira-subbar-count {
  font-size: var(--fs-sm) !important;
  color: var(--ink-3) !important;
}

/* Padded table wrapper \u2014 keeps sticky header working, gives the table breathing room */
#spira-root .spira-table-wrap {
  padding-bottom: var(--s-9) !important;
  padding-top: 0 !important;
}

/* Detail header \u2014 title / properties row */
#spira-root .spira-detail-hd-wrap {
  padding-top: var(--s-5) !important;
  padding-bottom: var(--s-3) !important;
  border-bottom: 1px solid var(--line) !important;
  background: var(--paper) !important;
}

/* Wider in-cell padding so columns have breathing room */
#spira-root .spira-tk-table th,
#spira-root .spira-tk-table td {
  padding-left: var(--s-5) !important;
  padding-right: var(--s-5) !important;
}
#spira-root .spira-tk-table th { padding-top: var(--s-4) !important; padding-bottom: var(--s-4) !important; }
#spira-root .spira-tk-table td { padding-top: var(--s-4) !important; padding-bottom: var(--s-4) !important; }
#spira-root .spira-tk-checkbox-cell {
  padding-left: var(--s-3) !important;
  padding-right: var(--s-3) !important;
  width: 36px !important;
}
.spira-tk-id { font-family: var(--font-mono); color: var(--ink-3); font-size: var(--fs-sm); }
.spira-tk-title { color: var(--ink); max-width: 360px; overflow: hidden; text-overflow: ellipsis; }
.spira-tk-due--overdue { color: var(--danger); font-weight: 500; }
.spira-tk-aged { color: var(--warn); font-weight: 500; }

/* \u30C1\u30B1\u30C3\u30C8\u8A73\u7D30\u306E\u4E0A\u90E8\u306B\u51FA\u308B\u300C\u4ED6\u306E\u30E1\u30F3\u30D0\u30FC\u304C\u5185\u5BB9\u3092\u66F4\u65B0\u3057\u307E\u3057\u305F\u300D\u30D0\u30CA\u30FC\u3002
   30 \u79D2\u9593\u9694\u30DD\u30FC\u30EA\u30F3\u30B0\u3067\u5916\u90E8\u306E\u5909\u66F4\u3092\u691C\u77E5\u3057\u305F\u3089\u8868\u793A\u3055\u308C\u308B\u3002
   \u30E6\u30FC\u30B6\u304C\u300C\u66F4\u65B0\u300D\u30DC\u30BF\u30F3\u3092\u62BC\u3059\u307E\u3067\u6B8B\u308B (= \u7DE8\u96C6\u4E2D\u306E\u5165\u529B\u3092\u52DD\u624B\u306B\u6D88\u3055\u306A\u3044)\u3002 */
#spira-root .spira-refresh-banner {
  display: flex;
  align-items: center;
  gap: var(--s-3);
  padding: var(--s-3) var(--s-5);
  background: var(--accent-soft);
  border-bottom: 1px solid var(--accent);
  color: var(--accent-strong);
  font-size: var(--fs-md);
  flex-shrink: 0;
}
#spira-root .spira-refresh-banner svg {
  width: 14px; height: 14px;
  stroke: currentColor; fill: none; stroke-width: 1.7;
}

/* Filter chip strip (n365 style) */
#spira-root .spira-filter-chipstrip {
  display: flex; flex-wrap: wrap; gap: var(--s-2);
  padding: var(--s-2) var(--s-7);
  background: var(--paper-2);
  border-bottom: 1px solid var(--line);
}
#spira-root .spira-filter-chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 10px;
  background: var(--paper);
  color: var(--ink);
  border: 1px solid var(--paper-3);
  border-radius: 99px;
  font-size: var(--fs-xs);
  cursor: pointer;
}
#spira-root .spira-filter-chip:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--accent-strong); }
#spira-root .spira-filter-chip-clear {
  background: transparent;
  border: none;
  font-family: inherit;
  font-size: var(--fs-xs);
  color: var(--ink-3);
  padding: 0 var(--s-2);
  cursor: pointer;
}
#spira-root .spira-filter-chip-clear:hover { color: var(--danger); }

/* Filter popover (n365 style) */
#spira-root .spira-filter-pop {
  background: var(--paper);
  border: 1px solid var(--paper-3);
  border-radius: var(--r-3);
  box-shadow: var(--shadow-flyout);
  display: flex; flex-direction: column;
  min-width: 380px;
  max-height: 60vh;
}
#spira-root .spira-fpop-hd {
  display: flex; align-items: center; gap: var(--s-2);
  padding: var(--s-4) var(--s-5);
  border-bottom: 1px solid var(--paper-3);
  font-size: var(--fs-sm); font-weight: 600;
}
#spira-root .spira-fpop-hd > span:first-child { flex: 1; }
#spira-root .spira-fpop-close {
  background: transparent; border: none; cursor: pointer;
  font-size: 18px; color: var(--ink-3); line-height: 1; padding: 0 4px;
}
#spira-root .spira-fpop-close:hover { color: var(--ink); }
#spira-root .spira-fpop-body {
  padding: var(--s-3) var(--s-4); overflow-y: auto; flex: 1;
}
#spira-root .spira-fpop-empty {
  padding: var(--s-5);
  color: var(--ink-3);
  font-size: var(--fs-sm);
  text-align: center;
}
#spira-root .spira-fpop-row {
  display: flex; align-items: center; gap: var(--s-2);
  margin-bottom: var(--s-2);
}
#spira-root .spira-fpop-field { flex: 0 0 90px; font-size: var(--fs-sm); color: var(--ink-3); }
#spira-root .spira-fpop-op { flex: 0 0 24px; text-align: center; font-size: var(--fs-sm); color: var(--ink-3); }
#spira-root .spira-fpop-val { flex: 1; }
#spira-root .spira-fpop-rm {
  background: transparent; border: none; cursor: pointer;
  width: 22px; height: 22px;
  color: var(--ink-3); font-size: 14px;
  border-radius: var(--r-1);
}
#spira-root .spira-fpop-rm:hover { background: var(--danger-soft); color: var(--danger); }
#spira-root .spira-fpop-add {
  padding: var(--s-2) var(--s-4);
  border-top: 1px solid var(--paper-3);
}
#spira-root .spira-fpop-ft {
  display: flex; align-items: center; gap: var(--s-2);
  padding: var(--s-3) var(--s-5);
  border-top: 1px solid var(--paper-3);
}

/* Tab strip (open tickets) \u2014 3 zones: [back btn] [scrollable tabs] [actions] */
#spira-root .spira-tab-strip {
  display: flex;
  align-items: center;
  gap: var(--s-3);
  background: var(--paper-2);
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
  min-height: 48px;
  padding-top: 6px !important;
  padding-bottom: 6px !important;
}
#spira-root .spira-tab-left,
#spira-root .spira-tab-right {
  display: flex;
  align-items: center;
  gap: var(--s-2);
  flex-shrink: 0;
}
#spira-root .spira-tab-middle {
  display: flex;
  flex: 1;
  min-width: 0;
  overflow-x: auto;
  gap: 2px;
  align-items: center;
}
#spira-root .spira-tab {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 8px var(--s-3);
  background: transparent;
  border: 1px solid transparent;
  border-bottom: none;
  border-top-left-radius: var(--r-2);
  border-top-right-radius: var(--r-2);
  font-size: var(--fs-sm);
  color: var(--ink-3);
  cursor: pointer;
  flex-shrink: 0;
  margin-top: 4px;
  border-color: var(--line);
}
#spira-root .spira-tab:hover { color: var(--ink); background: var(--paper); }
#spira-root .spira-tab.active {
  background: var(--paper);
  color: var(--ink);
  border-color: var(--line);
  border-bottom: 1px solid var(--paper);
  margin-bottom: -1px;
  font-weight: 500;
}
/* Drag-to-reorder feedback */
#spira-root .spira-tab[draggable="true"] { cursor: grab; }
#spira-root .spira-tab[draggable="true"]:active { cursor: grabbing; }
#spira-root .spira-tab--dragging { opacity: 0.4; }
#spira-root .spira-tab--drop-target {
  box-shadow: -2px 0 0 0 var(--accent) inset;
}

/* Back-to-list button styled like a tab so heights line up */
#spira-root .spira-tab--back {
  background: var(--paper);
  border-color: var(--line);
  color: var(--ink);
  font-weight: 500;
  user-select: none;
}
#spira-root .spira-tab--back:hover {
  background: var(--paper-2);
}
#spira-root .spira-tab-close {
  background: transparent;
  border: none;
  width: 18px; height: 18px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  color: var(--ink-3);
  cursor: pointer;
  font-size: 14px;
  line-height: 1;
  padding: 0;
  margin-left: 4px;
}
#spira-root .spira-tab-close:hover { background: rgba(184, 83, 74, 0.18); color: var(--danger); }
#spira-root .spira-tab-close-all {
  background: transparent;
  border: none;
  font-family: inherit;
  font-size: var(--fs-xs);
  color: var(--ink-3);
  padding: 0 var(--s-3);
  cursor: pointer;
  align-self: center;
}
#spira-root .spira-tab-close-all:hover { color: var(--danger); }

/* Ticket detail (right-rail) */
.spira-detail {
  display: flex;
  gap: var(--s-7);
  height: 100%;
  min-height: 0;
}
.spira-detail-main {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: var(--s-7);
}
.spira-detail-hd { display: flex; flex-direction: column; gap: var(--s-3); }
.spira-detail-hd-meta {
  display: flex;
  align-items: center;
  gap: var(--s-3);
  font-size: var(--fs-sm);
  color: var(--ink-3);
}
.spira-detail-id-tag {
  font-family: var(--font-mono);
  background: var(--paper-2);
  border: 1px solid var(--paper-3);
  color: var(--ink);
  padding: 2px var(--s-3);
  border-radius: var(--r-2);
  display: inline-flex;
  align-items: center;
  gap: var(--s-2);
  cursor: pointer;
}
.spira-detail-id-tag:hover { background: var(--paper-2-strong); }
.spira-detail-title-input {
  font-size: var(--fs-h3);
  font-weight: 600;
  border: none;
  background: transparent;
  width: 100%;
  color: var(--ink);
  padding: var(--s-1) var(--s-2);
  border-radius: var(--r-2);
}

/* New-note form: send button overlaid in textarea bottom-right
 * !important everywhere to defeat host CSS position/dimension resets. */
#spira-root .spira-note-form {
  position: relative !important;
  display: block !important;
  padding: 0 !important;
  margin: 0 !important;
  line-height: 0 !important; /* avoid extra inline space below the textarea */
}
#spira-root .spira-note-form > * { line-height: normal; }
#spira-root .spira-note-form .spira-note-input {
  padding-right: 48px !important;   /* room for button + breathing space */
  padding-bottom: 40px !important;  /* room for button + breathing space */
  background: var(--paper) !important;
  border: 1px solid var(--paper-3) !important;
  border-radius: var(--r-3) !important;
  resize: none !important;          /* hide native resize grip \u2014 button sits there */
}
#spira-root .spira-note-form .spira-note-input:focus {
  border-color: var(--line-strong) !important;
}
#spira-root .spira-note-submit {
  position: absolute !important;
  right: 8px !important;
  bottom: 8px !important;
  width: 30px !important;
  height: 30px !important;
  display: inline-flex !important;
  align-items: center !important;
  justify-content: center !important;
  background: transparent !important;
  color: var(--ink-3) !important;
  border: 1px solid var(--paper-3) !important;
  border-radius: var(--r-2) !important;
  cursor: pointer !important;
  padding: 0 !important;
  transition: background 0.1s, color 0.1s, border-color 0.1s !important;
  z-index: 2 !important;
}
#spira-root .spira-note-submit:hover {
  background: var(--accent) !important;
  color: #fff !important;
  border-color: var(--accent) !important;
}
#spira-root .spira-note-submit:disabled {
  opacity: 0.4 !important;
  cursor: not-allowed !important;
}
#spira-root .spira-note-submit svg {
  width: 16px !important;
  height: 16px !important;
  display: block !important;
  stroke: currentColor !important;
  fill: none !important;
  stroke-width: 1.7 !important;
}

/* Title row: #XXX tag (left, mono, clickable to copy) + title input */
#spira-root .spira-detail-title-row {
  display: flex;
  align-items: center;
  gap: var(--s-3);
}
#spira-root .spira-detail-id {
  flex-shrink: 0;
  font-family: var(--font-mono);
  font-size: var(--fs-lg);
  font-weight: 500;
  color: var(--ink-3);
  background: var(--paper-2);
  border: 1px solid var(--paper-3);
  border-radius: var(--r-2);
  padding: 4px 10px;
  cursor: pointer;
  user-select: none;
  transition: background 0.1s, color 0.1s;
}
#spira-root .spira-detail-id:hover {
  background: var(--paper-2-strong);
  color: var(--ink);
}
.spira-detail-title-input:hover { background: var(--paper-2); }
.spira-detail-title-input:focus { background: var(--paper); outline: 1px solid var(--line-strong); }

.spira-detail-rail {
  width: 320px;
  flex-shrink: 0;
  background: var(--paper-2);
  border: 1px solid var(--paper-3);
  border-radius: var(--r-3);
  padding: var(--s-5);
  display: flex;
  flex-direction: column;
  gap: var(--s-5);
  align-self: flex-start;
}
.spira-prop-row {
  display: grid;
  grid-template-columns: 96px 1fr;
  align-items: center;
  gap: var(--s-3);
  font-size: var(--fs-md);
}
.spira-prop-label { color: var(--ink-3); font-size: var(--fs-sm); }
.spira-prop-value { color: var(--ink); }

/* Inline editable badge/label \u2014 same look as the list cell, but clickable. */
#spira-root .spira-prop-edit {
  cursor: pointer;
  user-select: none;
  transition: filter 0.1s;
}
#spira-root .spira-prop-edit:hover { filter: brightness(0.95); }
#spira-root .spira-prop-edit:focus-visible {
  outline: 2px solid var(--accent-soft);
  outline-offset: 2px;
}
#spira-root .spira-menu-item--current {
  background: var(--accent-soft);
  color: var(--accent-strong);
  font-weight: 500;
}

/* Thread */
.spira-th-list { display: flex; flex-direction: column; gap: var(--s-5); }
.spira-th-card {
  border-radius: var(--r-3);
  padding: var(--s-5);
  border: 1px solid var(--paper-3);
}
/* Received cards \u2014 chat-bubble style. External (customer) on the left,
 * Internal (\u793E\u5185\u30E1\u30F3\u30D0\u30FC) on the right with offset + accent tint. */
.spira-th-card--received {
  background: var(--paper-2);
  margin-right: 28px;
}
.spira-th-card--received[data-side="internal"] {
  background: rgba(122, 138, 120, 0.12);
  margin-left: 28px;
  margin-right: 0;
  border-color: rgba(122, 138, 120, 0.3);
}
#spira-root .spira-th-card--note {
  background: var(--paper);
  border-left: 3px solid var(--warn);
  /* \u5DE6 padding \u3092\u5F93\u6765 (31px) \u306E 2/3 \u306B\u5727\u7E2E \u2192 21px\u3002
     \u30CF\u30F3\u30C9\u30EB\u306F card.left+5\u301C+23 \u306B\u51FA\u308B\u306E\u3067\u3001\u6587\u5B57 (card.left+21\u301C) \u3068
     \u50C5\u304B\u306B\u91CD\u306A\u308B\u5834\u5408\u304C\u3042\u308B\u304C\u3001\u30CF\u30F3\u30C9\u30EB\u306F hover \u8868\u793A\u306E\u8584\u3044\u30A2\u30A4\u30B3\u30F3\u3067
     \u8996\u8A8D\u6027\u306B\u5F71\u97FF\u306A\u3044\u30D0\u30E9\u30F3\u30B9\u3002 */
  padding-left: 21px !important;
}
.spira-th-card-head {
  display: flex;
  align-items: center;
  gap: var(--s-3);
  margin-bottom: var(--s-3);
  font-size: var(--fs-sm);
  color: var(--ink-3);
}
.spira-th-card-head svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.7; }
.spira-th-card-from { color: var(--ink); font-weight: 500; }
.spira-th-card-body { font-size: var(--fs-md); line-height: 1.7; word-break: break-word; }
/* HTML \u30E1\u30FC\u30EB\u306E\u6BB5\u843D/\u898B\u51FA\u3057/\u30EA\u30B9\u30C8\u306E\u30DE\u30FC\u30B8\u30F3\u3092\u5FA9\u6D3B (\u4E0A\u306E .spira-root \u30EA\u30BB\u30C3\u30C8\u3067
   \u5168\u3066 margin:0 \u306B\u306A\u3063\u3066\u3044\u305F\u305F\u3081\u3001\`<p>line1</p><p>line2</p>\` \u306E\u6BB5\u843D\u9593\u304C
   \u6F70\u308C\u3066\u6539\u884C\u304C\u6D88\u3048\u3066\u3044\u305F)\u3002
   \u30A4\u30F3\u30E9\u30A4\u30F3\u30E1\u30E2\u306E\u7DE8\u96C6\u9818\u57DF (.ne-prose / .ne-content) \u306F\u72EC\u81EA\u306B margin \u3092
   \u7BA1\u7406\u3059\u308B\u306E\u3067\u9664\u5916\u3002 */
#spira-root .spira-th-card-body p,
#spira-root .spira-th-card-body h1,
#spira-root .spira-th-card-body h2,
#spira-root .spira-th-card-body h3,
#spira-root .spira-th-card-body h4,
#spira-root .spira-th-card-body h5,
#spira-root .spira-th-card-body h6,
#spira-root .spira-th-card-body ul,
#spira-root .spira-th-card-body ol,
#spira-root .spira-th-card-body blockquote,
#spira-root .spira-th-card-body pre {
  margin: 0.6em 0;
}
#spira-root .spira-th-card-body > *:first-child { margin-top: 0; }
#spira-root .spira-th-card-body > *:last-child  { margin-bottom: 0; }
/* \u30E1\u30E2\u306E\u7DE8\u96C6\u9818\u57DF (.ne-prose) \u306F\u30D1\u30C3\u30B1\u30FC\u30B8\u5074\u3067 margin \u3092\u7BA1\u7406\u3057\u3066\u3044\u308B\u306E\u3067
   \u3053\u3053\u306E\u5FA9\u6D3B\u30EB\u30FC\u30EB\u306F\u9069\u7528\u3057\u306A\u3044 (\u4E8C\u91CD\u30DE\u30FC\u30B8\u30F3\u3092\u9632\u3050) */
#spira-root .spira-th-card-body.ne-prose p,
#spira-root .spira-th-card-body.ne-prose h1,
#spira-root .spira-th-card-body.ne-prose h2,
#spira-root .spira-th-card-body.ne-prose h3,
#spira-root .spira-th-card-body.ne-prose h4,
#spira-root .spira-th-card-body.ne-prose h5,
#spira-root .spira-th-card-body.ne-prose h6,
#spira-root .spira-th-card-body.ne-prose ul,
#spira-root .spira-th-card-body.ne-prose ol,
#spira-root .spira-th-card-body.ne-prose blockquote,
#spira-root .spira-th-card-body.ne-prose pre {
  margin: 0;
}
#spira-root .spira-th-card-body[data-collapsed="true"] {
  position: relative !important;
  max-height: 6em !important; /* approx 3 lines */
  overflow: hidden !important;
}
#spira-root .spira-th-card-body[data-collapsed="true"]::after {
  content: '';
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 2.2em;
  background: linear-gradient(rgba(243,241,234,0), var(--paper-2));
  pointer-events: none;
}
#spira-root .spira-th-card--note .spira-th-card-body[data-collapsed="true"]::after {
  background: linear-gradient(rgba(250,250,247,0), var(--paper));
}
/* Collapse toggle \u2014 small pill below the card body */
#spira-root .spira-th-toggle {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: var(--s-3);
  padding: 4px 12px;
  background: var(--paper);
  border: 1px solid var(--paper-3);
  border-radius: 999px;
  font-family: inherit;
  font-size: var(--fs-xs);
  color: var(--ink-3);
  cursor: pointer;
  transition: background 0.1s, color 0.1s, border-color 0.1s;
}
#spira-root .spira-th-toggle:hover {
  background: var(--paper-2);
  color: var(--ink);
  border-color: var(--ink-4);
}

/* Pane title: solid background so cards don't bleed through when scrolling */
.spira-pane-title {
  display: flex;
  align-items: center;
  gap: var(--s-3);
  margin: 0 0 var(--s-4);
  padding: var(--s-3) 0;
  position: sticky;
  top: 0;
  z-index: 2;
  border-bottom: 1px solid var(--line);
}
.spira-split-pane[data-bg="paper"]  .spira-pane-title { background: var(--paper); }
.spira-split-pane[data-bg="paper-2"] .spira-pane-title { background: var(--paper-2); }
.spira-th-card-body img { max-width: 100%; height: auto; border-radius: var(--r-2); }
.spira-th-card-body a { color: var(--accent-strong); text-decoration: underline; }

/* Inbox */
.spira-inbox-list { display: flex; flex-direction: column; }
.spira-inbox-row {
  display: grid;
  grid-template-columns: 1fr 200px 140px auto;
  gap: var(--s-4);
  padding: var(--s-4);
  border-bottom: 1px solid var(--paper-3);
  align-items: center;
  font-size: var(--fs-md);
}
.spira-inbox-row:hover { background: var(--paper-2); }
.spira-inbox-subject { color: var(--ink); font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.spira-inbox-from    { color: var(--ink-3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.spira-inbox-date    { color: var(--ink-3); font-size: var(--fs-sm); }
.spira-inbox-actions { display: inline-flex; gap: var(--s-2); }

/* Card flash \u2014 used when a search result navigates to a specific
 * comment. The card briefly glows the accent color so the user can
 * spot the target after scroll. */
@keyframes spira-card-flash {
  0%   { box-shadow: 0 0 0 3px var(--accent); background-color: var(--accent-soft); }
  60%  { box-shadow: 0 0 0 3px var(--accent); background-color: var(--accent-soft); }
  100% { box-shadow: 0 0 0 0   transparent;   background-color: transparent; }
}
.spira-card-flash {
  animation: spira-card-flash 1.6s ease-out;
}

/* Search modal \u2014 Notion-style: centered + backdrop blur, scrollable
 * results, no buttons (Escape / outside-click to dismiss). */
.spira-search-modal-backdrop {
  align-items: flex-start;          /* anchor near top, not vertically centered */
  padding-top: 10vh;
}
.spira-search-modal {
  width: 720px !important;
  max-width: 92vw !important;
  max-height: 75vh !important;
  display: flex !important;
  flex-direction: column !important;
  padding: 0 !important;
  overflow: hidden !important;
}
.spira-search-modal-head {
  display: flex;
  align-items: center;
  gap: var(--s-3);
  padding: var(--s-4) var(--s-5);
  border-bottom: 1px solid var(--line);
}
#spira-root .spira-search-modal-icon {
  display: inline-flex !important;
  align-items: center !important;
  justify-content: center !important;
  width: 20px !important;
  height: 20px !important;
  color: var(--ink-3);
  flex-shrink: 0 !important;
}
#spira-root .spira-search-modal-icon svg,
#spira-root .spira-search-modal-close svg {
  width: 100% !important;
  height: 100% !important;
  display: block !important;
}
.spira-search-modal-input {
  flex: 1;
  min-width: 0;
  font-size: var(--fs-h3);
  font-weight: 500;
  border: none;
  outline: none;
  background: transparent;
  color: var(--ink);
  padding: 4px 0;
}
.spira-search-modal-input::placeholder { color: var(--ink-4); font-weight: 400; }
.spira-search-modal-close {
  flex-shrink: 0;
  width: 28px;
  height: 28px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: var(--ink-3);
  background: transparent;
  border: none;
  border-radius: var(--r-2);
  cursor: pointer;
}
.spira-search-modal-close:hover { background: var(--paper-2); color: var(--ink); }
.spira-search-modal-body {
  flex: 1;
  overflow-y: auto;
  padding: var(--s-3) var(--s-5);
}
.spira-search-modal-foot {
  padding: var(--s-2) var(--s-5);
  border-top: 1px solid var(--line);
  color: var(--ink-3);
  font-size: var(--fs-xs);
  min-height: 28px;
  display: flex;
  align-items: center;
}
.spira-search-modal-summary { flex: 1; }

/* Result groups & cards (used inside the modal) */
.spira-search-group {
  /* \u30C1\u30B1\u30C3\u30C8 1 \u4EF6\u3092\u56F2\u3080\u5916\u67A0\u3002\u30AB\u30FC\u30C9\u3068\u660E\u78BA\u306B\u533A\u5225\u3059\u308B\u305F\u3081\u5C11\u3057\u6FC3\u3044\u80CC\u666F\u3002 */
  margin-bottom: var(--s-4);
  background: var(--paper-2);
  border: 1px solid var(--line);
  border-radius: var(--r-2);
  overflow: hidden;
}
.spira-search-group-head {
  display: flex;
  align-items: center;
  gap: var(--s-3);
  width: 100%;
  padding: var(--s-3) var(--s-4);
  background: var(--paper-2);
  border: none;
  border-radius: 0;
  cursor: pointer;
  text-align: left;
  font: inherit;
  color: inherit;
  transition: background 0.1s;
  font-weight: 500;
}
.spira-search-group-head:hover {
  background: var(--paper-2-strong, var(--paper-2));
}
.spira-search-chevron {
  display: inline-flex;
  width: 16px;
  height: 16px;
  color: var(--ink-3);
  transition: transform 0.15s;
  flex-shrink: 0;
}
.spira-search-chevron.open { transform: rotate(180deg); }
.spira-search-group-body {
  padding: var(--s-3) var(--s-4) var(--s-4);
  background: var(--paper);   /* \u30AB\u30FC\u30C9\u3092\u7F6E\u304F\u9762\u306F\u30C1\u30B1\u30C3\u30C8\u67A0\u3088\u308A\u660E\u308B\u304F */
  border-top: 1px solid var(--line);
}
.spira-search-group-meta {
  color: var(--ink-3);
  font-size: var(--fs-sm);
  margin-bottom: var(--s-3);
}
.spira-search-group-matchhdr {
  font-size: var(--fs-sm);
  color: var(--ink-3);
  margin-bottom: var(--s-2);
}
.spira-search-card-list {
  display: flex;
  flex-direction: column;
  gap: var(--s-2);
}
.spira-search-card {
  display: flex;
  flex-direction: column;
  gap: var(--s-2);
  padding: var(--s-3) var(--s-4);
  background: var(--paper);
  border: 1px solid var(--line);
  border-left-width: 4px;       /* \u30BD\u30FC\u30B9\u5225\u30AB\u30E9\u30FC\u5E2F\u306E\u571F\u53F0 */
  border-radius: var(--r-2);
  cursor: pointer;
  transition: border-color 0.1s, background 0.1s, box-shadow 0.1s;
}
.spira-search-card:hover {
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}
/* \u30BD\u30FC\u30B9\u5225\u306E\u5DE6\u30DC\u30FC\u30C0\u30FC\u8272 + \u30D8\u30C3\u30C0\u306E\u30BD\u30FC\u30B9\u30E9\u30D9\u30EB\u8272\u3092\u5DEE\u3057\u8272\u306B\u3002
   \u5185\u90E8\u30E1\u30E2 = \u9EC4\u7CFB / \u30E1\u30FC\u30EB = \u9752\u7CFB / Teams = \u7D2B\u7CFB / \u305D\u306E\u4ED6 = \u30B0\u30EC\u30FC\u7CFB\u3002
   \u30E9\u30A4\u30C8/\u30C0\u30FC\u30AF\u4E21\u5BFE\u5FDC\u3067\u5341\u5206\u306A\u30B3\u30F3\u30C8\u30E9\u30B9\u30C8\u3092\u78BA\u4FDD\u3002 */
.spira-search-card--note   { border-left-color: #f59e0b; background: rgba(245, 158, 11, 0.04); }
.spira-search-card--note .spira-search-card-src   { color: #b45309; font-weight: 600; }
.spira-search-card--mail   { border-left-color: #3b82f6; }
.spira-search-card--mail   .spira-search-card-src { color: #1d4ed8; font-weight: 600; }
.spira-search-card--teams  { border-left-color: #8b5cf6; }
.spira-search-card--teams  .spira-search-card-src { color: #6d28d9; font-weight: 600; }
.spira-search-card--other  { border-left-color: #9ca3af; }
.spira-search-card--other  .spira-search-card-src { color: #4b5563; font-weight: 600; }
/* \u30C0\u30FC\u30AF\u30C6\u30FC\u30DE\u3067\u306F\u5C11\u3057\u660E\u308B\u3081\u306B */
#spira-root[data-theme='dark'] .spira-search-card--note  { background: rgba(245, 158, 11, 0.10); }
#spira-root[data-theme='dark'] .spira-search-card--note  .spira-search-card-src { color: #fbbf24; }
#spira-root[data-theme='dark'] .spira-search-card--mail  .spira-search-card-src { color: #60a5fa; }
#spira-root[data-theme='dark'] .spira-search-card--teams .spira-search-card-src { color: #a78bfa; }
#spira-root[data-theme='dark'] .spira-search-card--other .spira-search-card-src { color: #9ca3af; }
.spira-search-card-head {
  display: flex;
  align-items: center;
  gap: var(--s-2);
  font-size: var(--fs-sm);
}
.spira-search-card-icon {
  display: inline-flex;
  width: 14px;
  height: 14px;
  color: var(--ink-3);
}
.spira-search-card-src { color: var(--ink-3); }
.spira-search-card-from { font-weight: 500; }
.spira-search-card-time {
  color: var(--ink-3);
  margin-left: auto;
}
.spira-search-snippet {
  line-height: 1.6;
  color: var(--ink);
}
.spira-search-match {
  margin-bottom: var(--s-3);
  line-height: 1.6;
}
.spira-search-snippet mark,
.spira-search-match mark {
  background: rgba(255, 235, 130, 0.6);
  color: inherit;
  padding: 0 2px;
  border-radius: 2px;
  font-weight: 600;
}
.spira-search-empty {
  padding: var(--s-7) var(--s-3);
  color: var(--ink-3);
  text-align: center;
}
.spira-search-empty-title {
  font-size: var(--fs-md);
  margin-bottom: var(--s-2);
}
.spira-search-empty-hint {
  font-size: var(--fs-sm);
  white-space: pre-line;
  line-height: 1.6;
}

/* Trash */
.spira-trash-toolbar {
  display: flex;
  align-items: center;
  gap: var(--s-3);
  padding: var(--s-4) 0;
  border-bottom: 1px solid var(--line);
  margin-bottom: var(--s-5);
}

/* ---------- 5. States ---------- */
.spira-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: var(--s-3);
  padding: var(--s-10);
  color: var(--ink-3);
  font-size: var(--fs-md);
  text-align: center;
}
.spira-empty-title { color: var(--ink); font-size: var(--fs-lg); font-weight: 500; }

/* Ensure error / message text is always drag-selectable, even though
   parent overlay uses \`all: initial\` and some browsers' UA defaults reset
   \`user-select\` to \`none\` on focused interactive elements. */
.spira-root .spira-empty,
.spira-root .spira-empty *,
.spira-root pre,
.spira-root .spira-th-card-body,
.spira-root .spira-th-card-body *,
.spira-root .spira-toast,
.spira-root .spira-error-banner,
.spira-root .spira-modal-body,
.spira-root .spira-modal-body * {
  -webkit-user-select: text;
  user-select: text;
  cursor: text;
}
.spira-root .spira-empty button,
.spira-root .spira-toast button,
.spira-root .spira-error-banner button,
.spira-root .spira-modal-body button,
.spira-root .spira-modal-body a {
  cursor: pointer;
}
/* Form controls inside modals must stay interactive (cursor: text on the
   wrapping label/div above would otherwise propagate to checkboxes etc.). */
.spira-root .spira-modal-body input,
.spira-root .spira-modal-body textarea,
.spira-root .spira-modal-body select {
  cursor: auto;
}
.spira-root .spira-modal-body input[type="checkbox"],
.spira-root .spira-modal-body input[type="radio"] {
  cursor: pointer;
}

.spira-skeleton {
  background: linear-gradient(90deg, var(--paper-2) 0%, var(--paper-2-strong) 50%, var(--paper-2) 100%);
  background-size: 200% 100%;
  animation: spira-skl 1.2s ease-in-out infinite;
  border-radius: var(--r-2);
}
@keyframes spira-skl {
  from { background-position: 200% 0; }
  to   { background-position: -200% 0; }
}

.spira-spin { animation: spira-spin 1s linear infinite; transform-origin: center; }
@keyframes spira-spin { to { transform: rotate(360deg); } }


/* ============================================================
   note-editor \u2014 Spira theme overrides + note-card layout
   ============================================================
   The editor itself ships its own .ne-* styles (src/lib/note-editor/
   editor.css). Here we only:
     1. Re-skin its CSS variables to match Spira's palette.
     2. Define how the editor sits inside the note-form / note-card.
   Keep this section thin \u2014 anything that's editor-internal belongs
   in the package, not here.
   ============================================================ */

#spira-root .ne-editor,
.ne-prose,
.ne-slash,
.ne-ftb,
.ne-drag-handle {
  --ne-override-bg:            var(--paper);
  --ne-override-text:          var(--ink);
  --ne-override-muted:         var(--ink-3);
  --ne-override-faint:         var(--ink-4);
  --ne-override-surface:       var(--paper-2);
  --ne-override-border:        var(--line);
  --ne-override-border-strong: var(--line-strong);
  --ne-override-accent:        var(--accent);
  --ne-override-accent-soft:   var(--accent-soft);
  --ne-override-radius:        var(--r-2);
  --ne-override-radius-lg:     var(--r-3);
  --ne-override-font-size:     var(--fs-md);
  --ne-override-shadow:        0 8px 24px rgba(0, 0, 0, 0.12);
  /* Inline \`<code>\` accent \u2014 keep it red but theme-aware. */
  --ne-override-inline-code:   #c7254e;
}

/* Note form: editor stretches, save button to the right */
#spira-root .spira-note-form--editor {
  display: flex;
  align-items: flex-end;
  gap: var(--s-3);
}
#spira-root .spira-note-form--editor .ne-editor {
  flex: 1;
  min-width: 0;
}
#spira-root .spira-note-form--editor .spira-note-submit {
  flex-shrink: 0;
}

/* Inside note cards, drop the editor's own box. The card already provides
   the surface (background, colored left border); duplicating with another
   border + radius around .ne-content double-frames the content. We also
   pull margin-left to 0 so text snugs up against the card's left border \u2014
   the floating drag handle still works because it positions via fixed
   coordinates from getBoundingClientRect, not via the gutter. */
#spira-root .spira-th-card--note .ne-content,
#spira-root .spira-th-card--note .ne-content:focus {
  border: 0;
  background: transparent;
  padding: 0;
  margin-left: 0;
  min-height: 0;
}
/* Empty-state placeholder follows the new (zero) padding. */
#spira-root .spira-th-card--note .ne-content.ne-empty::before {
  top: 0;
  left: 0;
}

/* ============================================================
   Ticket properties modal
   ============================================================ */
#spira-root .spira-prop-body {
  display: flex;
  flex-direction: column;
  gap: var(--s-5);
  max-height: 70vh;
  overflow-y: auto;
}
#spira-root .spira-prop-section {
  border: 1px solid var(--line);
  border-radius: var(--r-2);
  padding: var(--s-4);
  background: var(--paper);
}
#spira-root .spira-prop-section-title {
  margin: 0 0 var(--s-3);
  font-size: var(--fs-md);
  font-weight: 600;
  color: var(--ink);
}
#spira-root .spira-prop-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--s-2) var(--s-4);
}
#spira-root .spira-prop-grid > div {
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
}
#spira-root .spira-prop-label {
  font-size: var(--fs-sm);
  color: var(--ink-3);
  font-weight: 500;
}
#spira-root .spira-prop-hint {
  margin-top: var(--s-3);
  font-size: var(--fs-sm);
  color: var(--ink-3);
}
#spira-root .spira-prop-thread-state {
  margin-bottom: var(--s-3);
}
#spira-root .spira-prop-thread-status {
  display: inline-flex;
  align-items: center;
  gap: var(--s-2);
  padding: var(--s-1) var(--s-2);
  border-radius: var(--r-1);
  font-size: var(--fs-sm);
  font-weight: 500;
  margin-bottom: var(--s-2);
}
#spira-root .spira-prop-thread-status--linked {
  background: rgba(34, 197, 94, 0.1);
  color: rgb(34, 197, 94);
}
#spira-root .spira-prop-thread-status--unlinked {
  background: var(--paper-2);
  color: var(--ink-3);
}
#spira-root .spira-prop-thread-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--ink-4);
}
#spira-root .spira-prop-thread-dot--ok {
  background: rgb(34, 197, 94);
}
#spira-root .spira-prop-thread-meta {
  display: flex;
  flex-direction: column;
  gap: var(--s-1);
  padding: var(--s-2) var(--s-3);
  background: var(--paper-2);
  border-radius: var(--r-1);
  font-size: var(--fs-sm);
}
#spira-root .spira-prop-thread-meta > div {
  display: flex;
  gap: var(--s-2);
  align-items: baseline;
  min-width: 0;
}
#spira-root .spira-prop-thread-meta > div > .spira-prop-label {
  flex-shrink: 0;
  width: 92px;
}
#spira-root .spira-prop-thread-meta a,
#spira-root .spira-prop-thread-meta code {
  font-family: ui-monospace, Menlo, monospace;
  font-size: 12px;
  word-break: break-all;
  min-width: 0;
}
#spira-root .spira-prop-thread-meta a {
  color: var(--accent);
  text-decoration: none;
}
#spira-root .spira-prop-thread-meta a:hover {
  text-decoration: underline;
}
#spira-root .spira-prop-thread-actions {
  display: flex;
  gap: var(--s-2);
  margin-bottom: var(--s-3);
}
#spira-root .spira-prop-manual {
  border-top: 1px dashed var(--line);
  padding-top: var(--s-3);
  margin-top: var(--s-3);
}
#spira-root .spira-prop-manual-label {
  display: block;
  margin-bottom: var(--s-2);
  font-size: var(--fs-sm);
  color: var(--ink-2);
}
#spira-root .spira-prop-url-input {
  width: 100%;
  font-family: ui-monospace, Menlo, monospace;
  font-size: 12px;
}
#spira-root .spira-prop-parse-info {
  margin-top: var(--s-2);
  font-size: var(--fs-sm);
}
#spira-root .spira-prop-parse-ok {
  display: flex;
  flex-direction: column;
  gap: var(--s-1);
  padding: var(--s-2) var(--s-3);
  background: rgba(34, 197, 94, 0.05);
  border: 1px solid rgba(34, 197, 94, 0.3);
  border-radius: var(--r-1);
}
#spira-root .spira-prop-parse-ok > div {
  display: flex;
  gap: var(--s-2);
}
#spira-root .spira-prop-parse-ok > div > .spira-prop-label {
  width: 80px;
  flex-shrink: 0;
}
#spira-root .spira-prop-parse-ok code {
  font-family: ui-monospace, Menlo, monospace;
  font-size: 12px;
  word-break: break-all;
}
#spira-root .spira-prop-parse-err {
  padding: var(--s-2) var(--s-3);
  background: rgba(239, 68, 68, 0.05);
  border: 1px solid rgba(239, 68, 68, 0.3);
  border-radius: var(--r-1);
  color: rgb(239, 68, 68);
}
#spira-root .spira-prop-manual-hint {
  margin-top: 4px;
  font-size: 11px;
  color: var(--ink-4);
}
#spira-root .spira-prop-parse-applying {
  margin-top: 4px;
  font-size: var(--fs-sm);
  color: rgb(34, 197, 94);
  font-weight: 500;
}

/* ============================================================
   Update banner (\u30D0\u30FC\u30B8\u30E7\u30F3\u66F4\u65B0\u6848\u5185)
   ============================================================ */
#spira-root .spira-update-banner {
  background: #fef3c7;          /* amber-50 */
  border-bottom: 1px solid #f59e0b;
  color: #92400e;
  padding: var(--s-3) var(--gutter);
  font-size: var(--fs-sm);
  display: flex;
  align-items: center;
  gap: var(--s-3);
}
#spira-root[data-theme='dark'] .spira-update-banner {
  background: rgba(245, 158, 11, 0.15);
  border-bottom-color: rgba(245, 158, 11, 0.5);
  color: #fbbf24;
}

/* ============================================================
   \u5916\u90E8\u66F4\u65B0\u30D0\u30C3\u30B8 (\u4ED6\u306E\u30E6\u30FC\u30B6\u30FC\u304C\u66F4\u65B0\u3057\u305F\u30AB\u30FC\u30C9\u306B\u4ED8\u304F\u300C\u66F4\u65B0\u300D\u30E9\u30D9\u30EB)
   ============================================================ */
/* \u66F4\u65B0 badge \u2014 \u4ED6\u306E\u30E6\u30FC\u30B6\u30FC\u304C\u66F4\u65B0\u3057\u305F\u30AB\u30FC\u30C9\u306B\u4ED8\u304F\u3002
   \u30AA\u30EC\u30F3\u30B8\u7CFB\u3067\u300C\u5909\u66F4\u3042\u308A\u3001\u78BA\u8A8D\u3059\u3079\u304D\u300D\u306E\u610F\u5473\u5408\u3044 (NEW \u306E\u9752\u3068\u533A\u5225)\u3002 */
#spira-root .spira-card-updated-badge {
  display: inline-flex;
  align-items: center;
  padding: 1px 8px;
  background: #f59e0b;   /* amber-500 */
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.05em;
  border-radius: var(--r-1);
  flex-shrink: 0;
}

/* ====================================================================
 * AI \u30C1\u30E3\u30C3\u30C8\u30DA\u30A4\u30F3 (\u53F3\u30DA\u30A4\u30F3) \u2014 shapion \`#shapion-ai-panel\` \u4E92\u63DB\u30EC\u30A4\u30A2\u30A6\u30C8
 * \u30C1\u30B1\u30C3\u30C8\u8A73\u7D30\u306E split-pane \u5185\u306B\u4E26\u3076\u7B2C 3 \u306E\u30DA\u30A4\u30F3\u3068\u3057\u3066 flex \u3067\u4E26\u7F6E\u3002
 * \`!important\` \u3092\u591A\u7528\u3057\u3066\u308B\u306E\u306F\u4ED6\u306E\u30B0\u30ED\u30FC\u30D0\u30EB CSS \u30EA\u30BB\u30C3\u30C8 (.spira-root *
 * \u306E\u5168 margin:0 \u306A\u3069) \u306E\u5F71\u97FF\u3092\u6392\u9664\u3059\u308B\u305F\u3081\u3002 */

#spira-root .spira-ai-pane {
  /* \u65E2\u5B9A 360px\u3002\u30EA\u30B5\u30A4\u30B6\u304C\u30A4\u30F3\u30E9\u30A4\u30F3 style.width \u3067\u52D5\u7684\u306B\u4E0A\u66F8\u304D\u3059\u308B\u306E\u3067
     CSS \u5074\u306F !important \u3092\u4ED8\u3051\u306A\u3044 (\u4ED8\u3051\u308B\u3068\u30C9\u30E9\u30C3\u30B0\u304C\u52B9\u304B\u306A\u304F\u306A\u308B)\u3002 */
  width: 360px;
  flex: 0 0 360px;
  flex-shrink: 0 !important;
  background: var(--paper-2) !important;
  border-left: 1px solid var(--paper-3) !important;
  display: flex !important;
  flex-direction: column !important;
  overflow: hidden !important;
  font-family: inherit !important;
  min-width: 0 !important;
}

/* \u2500\u2500 Header \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
#spira-root .spira-ai-hd {
  display: flex !important;
  align-items: center !important;
  gap: 6px !important;
  padding: 12px 14px !important;
  border-bottom: 1px solid var(--paper-3) !important;
  flex-shrink: 0 !important;
  min-height: 44px !important;
  box-sizing: border-box !important;
}
#spira-root .spira-ai-title {
  display: inline-flex !important;
  align-items: center !important;
  gap: 6px !important;
  font-size: var(--fs-md) !important;
  font-weight: 600 !important;
  color: var(--ink) !important;
}
#spira-root .spira-ai-iconbtn {
  border: none !important;
  background: transparent !important;
  cursor: pointer !important;
  color: var(--ink) !important;
  padding: 4px !important;
  border-radius: 4px !important;
  display: inline-flex !important;
  align-items: center !important;
  justify-content: center !important;
  opacity: 0.5 !important;
  transition: background 0.1s, opacity 0.1s !important;
  line-height: 0 !important;
}
#spira-root .spira-ai-iconbtn:hover {
  background: rgba(55, 53, 47, 0.08) !important;
  opacity: 1 !important;
}

/* \u2500\u2500 History dropdown row \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
#spira-root .spira-ai-hist-row {
  padding: 8px 14px 10px !important;
  border-bottom: 1px solid var(--paper-3) !important;
  flex-shrink: 0 !important;
  box-sizing: border-box !important;
}
#spira-root .spira-ai-hist {
  width: 100% !important;
  box-sizing: border-box !important;
  border: 1px solid var(--paper-3) !important;
  border-radius: var(--r-2) !important;
  background: var(--paper) !important;
  padding: 7px 12px !important;
  font-size: var(--fs-sm) !important;
  font-family: inherit !important;
  color: var(--ink) !important;
  cursor: pointer !important;
  outline: none !important;
}
#spira-root .spira-ai-hist:hover { border-color: var(--ink-4) !important; }
#spira-root .spira-ai-hist:focus { border-color: var(--accent) !important; }

/* \u2500\u2500 Messages list \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
#spira-root .spira-ai-messages {
  flex: 1 1 auto !important;
  overflow-y: auto !important;
  padding: 14px 14px !important;
  display: flex !important;
  flex-direction: column !important;
  gap: 12px !important;
  min-height: 0 !important;
  box-sizing: border-box !important;
}
#spira-root .spira-ai-empty {
  text-align: center !important;
  color: var(--ink-3) !important;
  padding: 24px 12px !important;
  align-self: center !important;
}
#spira-root .spira-ai-empty-title {
  font-size: var(--fs-md) !important;
  font-weight: 500 !important;
  margin-bottom: 6px !important;
  color: var(--ink) !important;
}
#spira-root .spira-ai-empty-sub {
  font-size: var(--fs-sm) !important;
  line-height: 1.6 !important;
}
#spira-root .spira-ai-row {
  display: flex !important;
  flex-direction: column !important;
  gap: 4px !important;
  width: 100% !important;
}
#spira-root .spira-ai-label {
  font-size: 10px !important;
  color: var(--ink-3) !important;
  font-weight: 500 !important;
  letter-spacing: 0.02em !important;
}
#spira-root .spira-ai-msg {
  display: block !important;
  width: 100% !important;
  padding: 10px 12px !important;
  border-radius: var(--r-2) !important;
  font-size: var(--fs-sm) !important;
  line-height: 1.65 !important;
  white-space: pre-wrap !important;
  word-break: break-word !important;
  box-sizing: border-box !important;
}
/* \u5168\u5E45\u30AB\u30FC\u30C9 \u2014 shapion \u540C\u69D8\u3001\u5DE6\u53F3\u5BC4\u305B\u306F\u3057\u306A\u3044 */
#spira-root .spira-ai-user {
  background: rgba(122, 138, 120, 0.10) !important;  /* accent-soft \u5F31\u3081 */
  border: 1px solid rgba(122, 138, 120, 0.2) !important;
  color: var(--ink) !important;
}
#spira-root .spira-ai-assistant {
  background: var(--paper) !important;
  border: 1px solid var(--paper-3) !important;
  color: var(--ink) !important;
}
#spira-root .spira-ai-msg code {
  background: rgba(135, 131, 120, 0.2) !important;
  padding: 1px 4px !important;
  border-radius: 3px !important;
  font-family: ui-monospace, Menlo, Consolas, monospace !important;
  font-size: 0.9em !important;
}
#spira-root .spira-ai-codeblock {
  background: var(--paper-2) !important;
  border: 1px solid var(--paper-3) !important;
  border-radius: var(--r-2) !important;
  padding: 8px 10px !important;
  margin: 6px 0 !important;
  font-family: ui-monospace, Menlo, Consolas, monospace !important;
  font-size: 12px !important;
  line-height: 1.5 !important;
  overflow-x: auto !important;
  white-space: pre !important;
  color: var(--ink) !important;
}
#spira-root .spira-ai-loading { opacity: 0.55 !important; font-style: italic !important; }

/* \u2500\u2500 Action buttons under AI msgs (\u{1F4CC} \u30E1\u30E2\u3068\u3057\u3066\u4FDD\u5B58 / \u30B3\u30D4\u30FC) \u2500\u2500 */
#spira-root .spira-ai-actions {
  display: flex !important;
  gap: 6px !important;
  flex-wrap: wrap !important;
  margin-top: 6px !important;
}
#spira-root .spira-ai-action-btn {
  display: inline-flex !important;
  align-items: center !important;
  gap: 4px !important;
  padding: 4px 10px !important;
  background: var(--paper) !important;
  border: 1px solid var(--line) !important;
  border-radius: 12px !important;
  font-size: var(--fs-xs) !important;
  color: var(--ink-3) !important;
  cursor: pointer !important;
  font-family: inherit !important;
  line-height: 1 !important;
  height: 24px !important;
  transition: background 0.1s, border-color 0.1s, color 0.1s !important;
}
#spira-root .spira-ai-action-btn:hover {
  background: var(--accent-soft) !important;
  border-color: var(--accent) !important;
  color: var(--ink) !important;
}

/* \u2500\u2500 Quick prompt chips \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
#spira-root .spira-ai-chips {
  display: flex !important;
  gap: 6px !important;
  padding: 10px 14px 0 !important;
  flex-wrap: wrap !important;
  flex-shrink: 0 !important;
  box-sizing: border-box !important;
}
#spira-root .spira-ai-chip {
  border: 1px solid var(--line) !important;
  background: var(--paper) !important;
  padding: 5px 12px !important;
  border-radius: 14px !important;
  cursor: pointer !important;
  font-size: var(--fs-xs) !important;
  color: var(--ink-3) !important;
  font-family: inherit !important;
  height: 26px !important;
  line-height: 1 !important;
  display: inline-flex !important;
  align-items: center !important;
  transition: background 0.1s, border-color 0.1s, color 0.1s !important;
}
#spira-root .spira-ai-chip:hover {
  background: var(--accent-soft) !important;
  border-color: var(--accent) !important;
  color: var(--ink) !important;
}

/* \u2500\u2500 Input area \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
#spira-root .spira-ai-inputarea {
  padding: 10px 14px 14px !important;
  border-top: 1px solid var(--paper-3) !important;
  flex-shrink: 0 !important;
  box-sizing: border-box !important;
  background: var(--paper-2) !important;
}
#spira-root .spira-ai-model-pick {
  display: block !important;
  margin: 0 0 6px !important;
  padding: 3px 8px !important;
  font-size: 11px !important;
  font-family: inherit !important;
  background: transparent !important;
  color: var(--ink-3) !important;
  border: 1px solid var(--paper-3) !important;
  border-radius: var(--r-2) !important;

   note-editor \u2014 drop-in styles
   ============================================================
   - All selectors are scoped to \`.ne-editor\` (the editor root) or
     \`.ne-prose\` (for read-only rendering of markdown output).
   - Floating widgets (.ne-slash, .ne-ftb, .ne-drag-handle) attach
     to document.body, so they're styled at the top level.
   - Theme via CSS variables with sensible fallbacks. Override them
     by setting --ne-* on .ne-editor (or any ancestor) in your app.
   ============================================================ */

.ne-editor,
.ne-prose,
.ne-slash,
.ne-ftb,
.ne-drag-handle {
  --ne-bg:           var(--ne-override-bg,           #ffffff);
  --ne-text:         var(--ne-override-text,         #1f1f1f);
  --ne-muted:        var(--ne-override-muted,        #6b6b6b);
  --ne-faint:        var(--ne-override-faint,        #a8a39a);
  --ne-surface:      var(--ne-override-surface,      #f5f5f3);
  --ne-border:       var(--ne-override-border,       rgba(0, 0, 0, 0.10));
  --ne-border-strong:var(--ne-override-border-strong,rgba(0, 0, 0, 0.18));
  --ne-accent:       var(--ne-override-accent,       #4a7c59);
  --ne-accent-soft:  var(--ne-override-accent-soft,  rgba(74, 124, 89, 0.16));
  --ne-radius:       var(--ne-override-radius,       4px);
  --ne-radius-lg:    var(--ne-override-radius-lg,    6px);
  --ne-font-size:    var(--ne-override-font-size,    13px);
  --ne-line-height:  var(--ne-override-line-height,  1.65);
  --ne-mono:         var(--ne-override-mono,         ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace);
  --ne-shadow:       var(--ne-override-shadow,       0 8px 24px rgba(0, 0, 0, 0.12));

     normal text colour so syntax-highlighted snippets aren't tinted. */
  --ne-inline-code:  var(--ne-override-inline-code,  #c7254e);

     (e.g. SharePoint UI, fixed-positioned modals). Override with
     --ne-override-z-floating if your host needs a different stacking. */
  --ne-z-floating:   var(--ne-override-z-floating,   2147483647);

.ne-editor {
  position: relative;
  min-height: 80px;
}

.ne-content {
  position: relative;
  min-height: 80px;
  padding: 8px 12px;
  background: var(--ne-bg);
  color: var(--ne-text);
  border: 1px solid var(--ne-border);
  border-radius: var(--ne-radius);
  font-size: var(--ne-font-size);
  line-height: var(--ne-line-height);
  outline: none;
  white-space: pre-wrap;
  word-break: break-word;

     just outside the editor border without clipping. */

   element and ignores ::before, so the editor toggles \`.ne-empty\` itself
   via JS to drive this rule. */
.ne-content.ne-empty::before {

  top: 8px;
  left: 12px;

   \u898B\u51FA\u3057\u76F4\u5F8C\u306E\u30B3\u30F3\u30C6\u30F3\u30C4 (\u30EA\u30B9\u30C8\u30FB\u6BB5\u843D) \u3068\u306E\u7D50\u5408\u306F\u9006\u306B\u30BF\u30A4\u30C8\u306B\u898B\u305B\u308B\u3002
   AI \u751F\u6210\u30E1\u30E2\u306E\u3088\u3046\u306B h2 \u30D6\u30ED\u30C3\u30AF\u304C\u9023\u7D9A\u3059\u308B\u5834\u5408\u306B\u6700\u3082\u52B9\u304F\u3002 */
.ne-prose > h1 + *,
.ne-prose > h2 + *,
.ne-prose > h3 + * { margin-top: 4px; }
.ne-prose > * + h1,
.ne-prose > * + h2 { margin-top: 18px; }
.ne-prose > * + h3 { margin-top: 14px; }
.ne-prose h1 { font-size: 1.6em;  font-weight: 600; line-height: 1.3; }
.ne-prose h2 { font-size: 1.35em; font-weight: 600; line-height: 1.3; }
.ne-prose h3 { font-size: 1.15em; font-weight: 600; line-height: 1.3; }
/* \u30CD\u30B9\u30C8\u3055\u308C\u305F\u7B87\u6761\u66F8\u304D\u306F\u89AA <li> \u76F4\u4E0B\u306A\u306E\u3067\u3001\u30C7\u30D5\u30A9\u30EB\u30C8\u306E browser \u30DE\u30FC\u30B8\u30F3
   \u3092\u6291\u3048\u3066\u8996\u899A\u7684\u306B\u30BF\u30A4\u30C8\u306B\u7E4B\u3050\u3002\u30A4\u30F3\u30C7\u30F3\u30C8 (padding-left) \u306F\u89AA ul/ol \u3067
   \u65E2\u306B\u78BA\u4FDD\u6E08\u307F\u3002 */
.ne-prose li > ul,
.ne-prose li > ol {
  margin: 2px 0 2px;
  padding-left: 1.4em;

/* \u30EA\u30B9\u30C8\u9805\u76EE\u81EA\u4F53\u306E\u7E26\u30EA\u30BA\u30E0 \u2014 \u904E\u5BC6\u306B\u306A\u3089\u306A\u3044\u7A0B\u5EA6\u306E 2px\u3002 */
.ne-prose li + li { margin-top: 2px; }
/* \u6BB5\u843D\u5185\u884C\u9593 \u2014 \u30E1\u30E2\u7528\u306B\u3084\u3084\u5E83\u3081 (1.65) */
.ne-prose p { line-height: 1.65; }
.ne-prose blockquote {
  padding: 0 12px;
  border-left: 3px solid var(--ne-accent);
  color: var(--ne-muted);
}
.ne-prose pre {
  padding: 8px 12px;
  background: var(--ne-surface);
  border: 1px solid var(--ne-border);
  border-radius: var(--ne-radius);
  font-family: var(--ne-mono);
  font-size: 12px;
  white-space: pre;
  overflow-x: auto;
}
.ne-prose code {
  padding: 1px 4px;
  background: var(--ne-surface);
  border: 1px solid var(--ne-border);
  border-radius: 3px;
  font-family: var(--ne-mono);
  font-size: 0.92em;

  padding: 0;
  background: transparent;
  border: 0;
  color: inherit;
}
.ne-prose hr {

  border-top: 1px solid var(--ne-border-strong);
  margin: 10px 0;
}
.ne-prose ul,
.ne-prose ol { padding-left: 1.5em; }

  transition: outline-color 0.1s;

  outline-offset: 2px;

  align-items: center;
  gap: 8px;
  margin: 4px 2px;
  padding: 6px 10px;
  background: var(--ne-surface);
  border: 1px solid var(--ne-border);
  border-radius: var(--ne-radius);

.ne-prose .ne-file-status {

  font-size: 11px;
  color: var(--ne-muted);

  opacity: 0.6;
  cursor: progress;
  pointer-events: none;
}

/* Todo */
.ne-prose .ne-todo {

  align-items: flex-start;
  gap: 8px;
  padding: 2px 0;
}
.ne-prose .ne-todo-cb {
  margin-top: 4px;
  flex-shrink: 0;
  cursor: pointer;
}
.ne-prose .ne-todo-txt { flex: 1; min-width: 0; }
.ne-prose .ne-todo-txt.done {
  text-decoration: line-through;
  color: var(--ne-muted);
}

/* Callout */
.ne-prose .ne-callout {
  display: flex;
  gap: 8px;
  padding: 8px 12px;
  background: var(--ne-accent-soft);
  border-left: 3px solid var(--ne-accent);
  border-radius: var(--ne-radius);
}
.ne-prose .ne-callout-ic {
  flex-shrink: 0;
  font-size: 1.1em;
  line-height: 1.5;
}
.ne-prose .ne-callout-body { flex: 1; min-width: 0; }
.ne-prose .ne-callout-body > * { margin: 0; }
.ne-prose .ne-callout-body > * + * { margin-top: 6px; }

/* Tables \u2014 wrap shrinks to the table's own width so the right-edge
 * add-column "+" button sits at the table's right edge instead of
