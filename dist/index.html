   note-editor \u2014 drop-in styles
   ============================================================
   - All selectors are scoped to \`.ne-editor\` (the editor root) or
     \`.ne-prose\` (for read-only rendering of markdown output).
   - Floating widgets (.ne-slash, .ne-ftb, .ne-drag-handle) attach
     to document.body, so they're styled at the top level.
   - Theme via CSS variables with sensible fallbacks. Override them
     by setting --ne-* on .ne-editor (or any ancestor) in your app.
   ============================================================ */

.ne-editor,
.ne-prose,
.ne-slash,
.ne-ftb,
.ne-drag-handle {
  --ne-bg:           var(--ne-override-bg,           #ffffff);
  --ne-text:         var(--ne-override-text,         #1f1f1f);
  --ne-muted:        var(--ne-override-muted,        #6b6b6b);
  --ne-faint:        var(--ne-override-faint,        #a8a39a);
  --ne-surface:      var(--ne-override-surface,      #f5f5f3);
  --ne-border:       var(--ne-override-border,       rgba(0, 0, 0, 0.10));
  --ne-border-strong:var(--ne-override-border-strong,rgba(0, 0, 0, 0.18));
  --ne-accent:       var(--ne-override-accent,       #4a7c59);
  --ne-accent-soft:  var(--ne-override-accent-soft,  rgba(74, 124, 89, 0.16));
  --ne-radius:       var(--ne-override-radius,       4px);
  --ne-radius-lg:    var(--ne-override-radius-lg,    6px);
  --ne-font-size:    var(--ne-override-font-size,    13px);
  --ne-line-height:  var(--ne-override-line-height,  1.65);
  --ne-mono:         var(--ne-override-mono,         ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace);
  --ne-shadow:       var(--ne-override-shadow,       0 8px 24px rgba(0, 0, 0, 0.12));
  /* Inline \`<code>\` text colour. Code blocks (<pre><code>) inherit the
     normal text colour so syntax-highlighted snippets aren't tinted. */
  --ne-inline-code:  var(--ne-override-inline-code,  #c7254e);
  /* Floating widgets sit at near-max z so they punch through host overlays
     (e.g. SharePoint UI, fixed-positioned modals). Override with
     --ne-override-z-floating if your host needs a different stacking. */
  --ne-z-floating:   var(--ne-override-z-floating,   2147483647);
}

/* \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 Editor root + content \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */

.ne-editor {
  position: relative;
  min-height: 80px;
}

.ne-content {
  position: relative;
  min-height: 80px;
  padding: 8px 12px;
  background: var(--ne-bg);
  color: var(--ne-text);
  border: 1px solid var(--ne-border);
  border-radius: var(--ne-radius);
  font-size: var(--ne-font-size);
  line-height: var(--ne-line-height);
  outline: none;
  white-space: pre-wrap;
  word-break: break-word;
  cursor: text;
  /* Reserve a small left gutter so the floating drag handle has room to sit
     just outside the editor border without clipping. */
  margin-left: 24px;
}
.ne-content:focus { border-color: var(--ne-accent); }

/* Placeholder \u2014 shown only while the editor is empty.
   \`<br>\` (used by browsers in empty contenteditable paragraphs) is a void
   element and ignores ::before, so the editor toggles \`.ne-empty\` itself
   via JS to drive this rule. */
.ne-content.ne-empty::before {
  content: attr(data-placeholder);
  position: absolute;
  top: 8px;
  left: 12px;
  color: var(--ne-faint);
  pointer-events: none;
  white-space: nowrap;
  overflow: hidden;
  max-width: calc(100% - 24px);
  text-overflow: ellipsis;
}

/* \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 Prose (live + read-only) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */

.ne-prose > * { margin: 0; }
.ne-prose > * + * { margin-top: 10px; }
/* \u30BB\u30AF\u30B7\u30E7\u30F3\u898B\u51FA\u3057\u306F\u524D\u6BB5\u3068\u306E\u300C\u547C\u5438\u300D\u3092\u78BA\u4FDD\u3059\u308B\u305F\u3081\u5C11\u3057\u5E83\u3081\u306B\u4F59\u767D\u3092\u53D6\u308A\u3001
   \u898B\u51FA\u3057\u76F4\u5F8C\u306E\u30B3\u30F3\u30C6\u30F3\u30C4 (\u30EA\u30B9\u30C8\u30FB\u6BB5\u843D) \u3068\u306E\u7D50\u5408\u306F\u9006\u306B\u30BF\u30A4\u30C8\u306B\u898B\u305B\u308B\u3002
   AI \u751F\u6210\u30E1\u30E2\u306E\u3088\u3046\u306B h2 \u30D6\u30ED\u30C3\u30AF\u304C\u9023\u7D9A\u3059\u308B\u5834\u5408\u306B\u6700\u3082\u52B9\u304F\u3002 */
.ne-prose > h1 + *,
.ne-prose > h2 + *,
.ne-prose > h3 + * { margin-top: 4px; }
.ne-prose > * + h1,
.ne-prose > * + h2 { margin-top: 18px; }
.ne-prose > * + h3 { margin-top: 14px; }
.ne-prose h1 { font-size: 1.6em;  font-weight: 600; line-height: 1.3; }
.ne-prose h2 { font-size: 1.35em; font-weight: 600; line-height: 1.3; }
.ne-prose h3 { font-size: 1.15em; font-weight: 600; line-height: 1.3; }
/* \u30CD\u30B9\u30C8\u3055\u308C\u305F\u7B87\u6761\u66F8\u304D\u306F\u89AA <li> \u76F4\u4E0B\u306A\u306E\u3067\u3001\u30C7\u30D5\u30A9\u30EB\u30C8\u306E browser \u30DE\u30FC\u30B8\u30F3
   \u3092\u6291\u3048\u3066\u8996\u899A\u7684\u306B\u30BF\u30A4\u30C8\u306B\u7E4B\u3050\u3002\u30A4\u30F3\u30C7\u30F3\u30C8 (padding-left) \u306F\u89AA ul/ol \u3067
   \u65E2\u306B\u78BA\u4FDD\u6E08\u307F\u3002 */
.ne-prose li > ul,
.ne-prose li > ol {
  margin: 2px 0 2px;
  padding-left: 1.4em;
}
/* \u30EA\u30B9\u30C8\u9805\u76EE\u81EA\u4F53\u306E\u7E26\u30EA\u30BA\u30E0 \u2014 \u904E\u5BC6\u306B\u306A\u3089\u306A\u3044\u7A0B\u5EA6\u306E 2px\u3002 */
.ne-prose li + li { margin-top: 2px; }
/* \u6BB5\u843D\u5185\u884C\u9593 \u2014 \u30E1\u30E2\u7528\u306B\u3084\u3084\u5E83\u3081 (1.65) */
.ne-prose p { line-height: 1.65; }
.ne-prose blockquote {
  padding: 0 12px;
  border-left: 3px solid var(--ne-accent);
  color: var(--ne-muted);
}
.ne-prose pre {
  padding: 8px 12px;
  background: var(--ne-surface);
  border: 1px solid var(--ne-border);
  border-radius: var(--ne-radius);
  font-family: var(--ne-mono);
  font-size: 12px;
  white-space: pre;
  overflow-x: auto;
}
.ne-prose code {
  padding: 1px 4px;
  background: var(--ne-surface);
  border: 1px solid var(--ne-border);
  border-radius: 3px;
  font-family: var(--ne-mono);
  font-size: 0.92em;
  color: var(--ne-inline-code);
}
/* Code block content stays at normal text colour \u2014 only inline \`<code>\`
   gets the accent. */
.ne-prose pre code {
  padding: 0;
  background: transparent;
  border: 0;
  color: inherit;
}
.ne-prose hr {
  border: 0;
  border-top: 1px solid var(--ne-border-strong);
  margin: 10px 0;
}
.ne-prose ul,
.ne-prose ol { padding-left: 1.5em; }

.ne-prose img.ne-img,
.ne-prose img {
  max-width: 100%;
  height: auto;
  border-radius: var(--ne-radius);
  display: block;
  margin: 8px 0;

/* Image resize affordance \u2014 only inside the editable area (not the

 * markdown as \`{w=N}\`. */
.ne-content img.ne-img {
  cursor: default;
  transition: outline-color 0.1s;

.ne-content img.ne-img:hover {
  outline: 2px solid rgba(74, 139, 255, 0.5);
  outline-offset: 2px;
}

/* \u901A\u5E38\u30EA\u30F3\u30AF (\u30AA\u30FC\u30C8\u30EA\u30F3\u30AF / [text](url) \u3069\u3061\u3089\u3082\u5BFE\u8C61)\u3002\u30D5\u30A1\u30A4\u30EB\u30C1\u30C3\u30D7
   \`.ne-file\` \u306F\u5225\u30B9\u30BF\u30A4\u30EB (\u4E0A\u66F8\u304D\u3055\u308C\u308B) \u306A\u306E\u3067\u5F71\u97FF\u306A\u3057\u3002\u30AF\u30EA\u30C3\u30AF\u3067
   \u65B0\u898F\u30BF\u30D6\u9077\u79FB\u3059\u308B\u30CF\u30F3\u30C9\u30E9\u306F editor.ts \u306E click listener \u5074\u3067\u5B9F\u88C5\u3002 */
.ne-prose a[href]:not(.ne-file),
.ne-content a[href]:not(.ne-file) {
  color: var(--ne-accent, #3a6dd9);
  text-decoration: underline;
  text-underline-offset: 2px;
  cursor: pointer;
  word-break: break-all;
}
.ne-prose a[href]:not(.ne-file):hover,
.ne-content a[href]:not(.ne-file):hover {
  color: var(--ne-accent, #3a6dd9);
  text-decoration: underline;
  filter: brightness(0.85);
}

/* File attachment chip (Excel/PDF/Word/etc. linked into the memo). The
   underlying anchor stays a real <a target="_blank">, so click handling
   is the browser's responsibility \u2014 no JS hook needed. */
.ne-prose .ne-file {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin: 4px 2px;
  padding: 6px 10px;
  background: var(--ne-surface);
  border: 1px solid var(--ne-border);
  border-radius: var(--ne-radius);
  color: var(--ne-text);
  text-decoration: none;
  font-size: var(--ne-font-size);
  line-height: 1.3;
  max-width: 100%;
  cursor: pointer;
  user-select: none;
}
.ne-prose .ne-file:hover {
  background: var(--ne-accent-soft);
  border-color: var(--ne-accent);
}
.ne-prose .ne-file-ic {
  flex-shrink: 0;
  font-size: 1.15em;
  line-height: 1;
}
.ne-prose .ne-file-name {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  min-width: 0;
  flex: 0 1 auto;
  max-width: 32em;
}
.ne-prose .ne-file-status {
  flex-shrink: 0;
  font-size: 11px;
  color: var(--ne-muted);
  margin-left: 4px;
}
/* Uploading state: dimmed + non-clickable while the host upload is in
   flight. Removed when the placeholder is swapped for the real chip. */
.ne-prose .ne-file--uploading {
  opacity: 0.6;
  cursor: progress;
  pointer-events: none;
}

/* Todo */
.ne-prose .ne-todo {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 2px 0;
}
.ne-prose .ne-todo-cb {
  margin-top: 4px;
  flex-shrink: 0;
  cursor: pointer;
}
.ne-prose .ne-todo-txt { flex: 1; min-width: 0; }
.ne-prose .ne-todo-txt.done {
  text-decoration: line-through;
  color: var(--ne-muted);
}

/* Callout */
.ne-prose .ne-callout {
  display: flex;
  gap: 8px;
  padding: 8px 12px;
  background: var(--ne-accent-soft);
  border-left: 3px solid var(--ne-accent);
  border-radius: var(--ne-radius);
}
.ne-prose .ne-callout-ic {
  flex-shrink: 0;
  font-size: 1.1em;
  line-height: 1.5;
}
.ne-prose .ne-callout-body { flex: 1; min-width: 0; }
.ne-prose .ne-callout-body > * { margin: 0; }
.ne-prose .ne-callout-body > * + * { margin-top: 6px; }

/* Tables \u2014 wrap shrinks to the table's own width so the right-edge
 * add-column "+" button sits at the table's right edge instead of

.ne-prose .ne-table-wrap {
  position: relative;
  display: block;
  width: fit-content;
  max-width: 100%;
  overflow-x: auto;
  margin: 8px 0;
  /* \u884C\u30CF\u30F3\u30C9\u30EB (\u5DE6) / \u5217\u30CF\u30F3\u30C9\u30EB (\u4E0A) \u304C\u7F6B\u7DDA\u5916\u306B\u51FA\u3066\u3082\u898B\u5207\u308C\u306A\u3044\u3088\u3046\u306B
     padding \u3067\u8868\u793A\u9818\u57DF\u3092\u78BA\u4FDD\u3002\u53F3/\u4E0B\u306E\u30DB\u30D0\u30FC "+" \u30DC\u30BF\u30F3\u7528\u4F59\u767D\u3082\u540C\u3058\u7406\u7531\u3002 */
  padding-top: 22px;
  padding-left: 22px;
  padding-right: 16px;
  padding-bottom: 14px;
}
.ne-prose .ne-table {
  border-collapse: collapse;
  width: max-content;
  min-width: 240px;
}
.ne-prose .ne-table td,
.ne-prose .ne-table th {
  border: 1px solid var(--ne-border);
  padding: 4px 8px;
  min-width: 60px;
  vertical-align: top;
  outline: none;
}
.ne-content .ne-table td:focus { background: var(--ne-accent-soft); }

 * focused cell within a range still stands out. */
.ne-content .ne-table td.ne-cell-selected,
.ne-content .ne-table th.ne-cell-selected {
  background: var(--ne-accent-soft);
  box-shadow: inset 0 0 0 1px var(--ne-accent);
}
.ne-prose .ne-table th { background: var(--ne-surface); font-weight: 600; }

/* Column resize handle \u2014 6px-wide drag strip on the right edge of each
   cell (except the last column). Invisible by default; the accent rail
   shows on hover or while actively dragging. */
.ne-prose .ne-table td,
.ne-prose .ne-table th { position: relative; }
.ne-prose .ne-table-resize {
  position: absolute;
  top: 0;
  right: -3px;
  width: 6px;
  height: 100%;
  cursor: col-resize;
  z-index: 1;
  user-select: none;
}
.ne-prose .ne-table-resize::after {
  content: '';
  position: absolute;
  left: 2px;
  top: 2px;
  bottom: 2px;
  width: 2px;
  border-radius: 1px;
  background: transparent;
  transition: background 120ms ease;
}
.ne-prose .ne-table-resize:hover::after,
.ne-prose .ne-table-resize.dragging::after {
  background: var(--ne-accent);
}

/* Hover "+" buttons to grow the table.
   Hidden by default, fade in when the wrap is hovered. */

  position: absolute;
  appearance: none;
  background: var(--ne-surface);
  border: 1px solid var(--ne-border);
  color: var(--ne-muted);
  font-size: 12px;
  line-height: 1;
  padding: 0;
  cursor: pointer;
  opacity: 0;
  transition: opacity 120ms ease, background 120ms ease, color 120ms ease;
  border-radius: var(--ne-radius);
}
.ne-prose .ne-table-wrap:hover .ne-table-add { opacity: 1; }
.ne-prose .ne-table-add:hover {
  background: var(--ne-accent-soft);
  color: var(--ne-accent);
  border-color: var(--ne-accent);
}
.ne-prose .ne-table-add-row {
  left: 0;
  right: 16px;
  bottom: 0;
  height: 12px;
}
.ne-prose .ne-table-add-col {
  top: 0;
  bottom: 14px;
  right: 0;
  width: 12px;
}

/* Row / column action handles \u2014 appear at the left edge of the active
 * row and the top edge of the active column when a cell is clicked.
 * Click handle \u2192 opens the slash-menu-styled picker. Notion-like UX. */
.ne-table-handle {
  position: absolute;
  display: none;
  align-items: center;
  justify-content: center;
  width: 16px;
  height: 16px;
  border-radius: 4px;
  background: var(--ne-surface);
  border: 1px solid var(--ne-border);
  color: var(--ne-muted);
  cursor: pointer;
  user-select: none;
  z-index: 2;
  transition: background 0.1s, color 0.1s, border-color 0.1s;
}
.ne-table-handle:hover {
  background: var(--ne-accent-soft);
  color: var(--ne-accent);
  border-color: var(--ne-accent);
}
.ne-table-handle--row svg { transform: rotate(0deg); }   /* vertical dots */
.ne-table-handle--col svg { transform: rotate(90deg); }  /* horizontal dots */

 * Just give it a sensible default width. */
.ne-table-picker { width: 200px; }

 * fully removed from the codebase. */
.ne-table-menu {
  position: fixed;
  z-index: var(--ne-z-floating);
  background: var(--ne-bg);
  color: var(--ne-text);
  border: 1px solid var(--ne-border-strong);
  border-radius: var(--ne-radius-lg);
  box-shadow: var(--ne-shadow);
  padding: 4px;
  min-width: 200px;
  display: flex;
  flex-direction: column;
  font-size: var(--ne-font-size);
}
.ne-table-menu-item {
  appearance: none;
  background: transparent;
  border: 0;
  text-align: left;
  padding: 6px 12px;
  cursor: pointer;
  border-radius: var(--ne-radius);
  font-family: inherit;
  font-size: inherit;
  color: var(--ne-text);
  line-height: 1.4;
}
.ne-table-menu-item:hover { background: var(--ne-accent-soft); }
.ne-table-menu-sep {
  height: 1px;
  margin: 4px 6px;
  background: var(--ne-border);
}

/* \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 Floating widgets \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */

/* Drag handle (viewport-fixed so it floats above any host stacking context) */
.ne-drag-handle {
  position: fixed;
  width: 18px;
  align-items: center;
  justify-content: center;
  color: var(--ne-faint);
  cursor: grab;
  border-radius: var(--ne-radius);
  background: transparent;
  z-index: var(--ne-z-floating);
  user-select: none;
}
.ne-drag-handle:hover {
  background: var(--ne-surface);
  color: var(--ne-muted);
}
.ne-drag-handle:active { cursor: grabbing; }

.ne-block-dragging { opacity: 0.4; }

.ne-drop-line {
  height: 2px;
  background: var(--ne-accent);
  margin: 1px 0;
  border-radius: 1px;
  pointer-events: none;
}

/* Slash menu */
.ne-slash {
  position: fixed;
  z-index: var(--ne-z-floating);
  display: none;
  width: 280px;
  max-height: 360px;
  overflow-y: auto;
  background: var(--ne-bg);
  color: var(--ne-text);
  border: 1px solid var(--ne-border-strong);
  border-radius: var(--ne-radius-lg);
  box-shadow: var(--ne-shadow);
  padding: 4px;
  font-size: var(--ne-font-size);
  line-height: 1.4;
}
.ne-slash.on { display: block; }
.ne-slash-section {
  padding: 6px 8px 2px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--ne-faint);
}
.ne-slash-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: var(--ne-radius);
  cursor: pointer;
}
.ne-slash-item:hover,
.ne-slash-item.sel { background: var(--ne-accent-soft); }

.ne-slash-icon {
  width: 24px;
  height: 24px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 600;
  color: var(--ne-text);
  background: var(--ne-surface);
  border: 1px solid var(--ne-border);
  border-radius: var(--ne-radius);
}
.ne-slash-body { flex: 1; min-width: 0; }
.ne-slash-name { font-size: var(--ne-font-size); color: var(--ne-text); line-height: 1.2; }
.ne-slash-desc { font-size: 11px; color: var(--ne-muted); margin-top: 1px; }
.ne-slash-kbd {
  flex-shrink: 0;
  font-family: var(--ne-mono);
  font-size: 10px;
  color: var(--ne-muted);
  background: var(--ne-surface);
  border: 1px solid var(--ne-border);
  border-radius: 2px;
  padding: 1px 5px;
}

/* Floating selection toolbar */
.ne-ftb {
  position: fixed;
  z-index: var(--ne-z-floating);
  display: none;
  transform: translateX(-50%);
  padding: 2px;
  background: var(--ne-bg);
  border: 1px solid var(--ne-border-strong);
  border-radius: var(--ne-radius);
  box-shadow: var(--ne-shadow);
  gap: 1px;
}
.ne-ftb.on { display: flex; }
.ne-ftb-b {
  appearance: none;
  background: transparent;
  border: 0;
  padding: 4px 8px;
  cursor: pointer;
  font-size: var(--ne-font-size);
  color: var(--ne-text);
  border-radius: 2px;
  line-height: 1;
}
.ne-ftb-b:hover { background: var(--ne-surface); }

/* \u7A7A\u6BB5\u843D (round-trip \u3067\u4FDD\u6301\u3055\u308C\u305F Enter Enter \u306B\u3088\u308B\u7A7A\u884C)\u3002
   zero-width space \u3092 1 \u6587\u5B57\u542B\u3080\u305F\u3081 cursor \u304C\u78BA\u5B9F\u306B\u4F4D\u7F6E\u6C7A\u3081\u3067\u304D\u3001
   \u6700\u4F4E\u9650\u306E\u9AD8\u3055\u3092\u4E0E\u3048\u3066 margin \u3060\u3051\u3067\u57CB\u3082\u308C\u306A\u3044\u3088\u3046\u306B\u3059\u308B\u3002 */
.ne-blank-p {
  min-height: 1em;
}

/* \u30D8\u30C3\u30C0\u884C\u306B\u5909\u63DB\u3055\u308C\u305F\u30C6\u30FC\u30D6\u30EB\u306E\u5148\u982D\u884C (\u56FA\u5B9A\u8272)\u3002
   .ne-table-has-header \u30AF\u30E9\u30B9\u304C\u4ED8\u3044\u3066\u3044\u308B\u6642\u306E\u307F tr:first-child \u3092\u5F37\u8ABF\u3002 */
.ne-prose .ne-table.ne-table-has-header > tbody > tr:first-child > td,
.ne-prose .ne-table.ne-table-has-header > tr:first-child > td {
  background: var(--ne-accent-soft);
  font-weight: 600;
  color: var(--ne-text);
}

/* \u884C/\u5217\u30CF\u30F3\u30C9\u30EB\u306E\u30C9\u30E9\u30C3\u30B0\u4E2D\u3001\u5165\u308C\u66FF\u3048\u5148\u3068\u306A\u308B\u884C/\u5217\u306E\u30BB\u30EB\u3092\u30CF\u30A4\u30E9\u30A4\u30C8\u3002 */
.ne-prose .ne-table td.ne-tbl-swap-target,
.ne-prose .ne-table th.ne-tbl-swap-target {
  background: var(--ne-accent-soft);
  box-shadow: inset 0 0 0 2px var(--ne-accent);
}

/* \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 Link insert prompt \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
/* \u30B9\u30E9\u30C3\u30B7\u30E5\u30E1\u30CB\u30E5\u30FC\u304B\u3089 /link \u3067\u958B\u304F\u5C0F\u578B\u30D5\u30A9\u30FC\u30E0\u3002
   \u30AD\u30E3\u30EC\u30C3\u30C8\u8FD1\u304F\u306B\u30D5\u30ED\u30FC\u30C8\u3057\u3001URL + \u8868\u793A\u6587\u5B57\u3092\u5165\u529B\u3057\u3066 Enter \u3067\u633F\u5165\u3002 */
.ne-link-prompt {
  width: 340px;
  background: var(--ne-paper, #fff);
  border: 1px solid var(--ne-border-strong, rgba(15, 15, 15, 0.18));
  border-radius: 8px;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.16);
  padding: 12px;
  font-family: inherit;
  font-size: 13px;
  color: var(--ne-ink, #2d2d2a);
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.ne-link-prompt-row {
  display: grid;
  grid-template-columns: 64px 1fr;
  align-items: center;
  gap: 8px;
}
.ne-link-prompt-row label {
  font-size: 12px;
  color: var(--ne-muted, rgba(0,0,0,0.55));
  text-align: right;
}
.ne-link-prompt input {
  width: 100%;
  padding: 6px 8px;
  border: 1px solid var(--ne-border, rgba(15,15,15,0.14));
  border-radius: 4px;
  font: inherit;
  background: var(--ne-paper, #fff);
  color: var(--ne-ink, #2d2d2a);
  outline: none;
  box-sizing: border-box;
}
.ne-link-prompt input:focus {
  border-color: var(--ne-accent, #7a8a78);
  box-shadow: 0 0 0 1px var(--ne-accent-soft, rgba(122,138,120,0.2));
}
.ne-link-prompt-actions {
  display: flex;
  justify-content: flex-end;
  gap: 6px;
  margin-top: 2px;
}
.ne-link-prompt button {
  padding: 5px 12px;
  border-radius: 4px;
  border: 1px solid var(--ne-border, rgba(15,15,15,0.14));
  background: var(--ne-paper, #fff);
  color: var(--ne-ink, #2d2d2a);
  font: inherit;
  cursor: pointer;
  font-size: 12px;
}
.ne-link-prompt button.ne-link-ok {
  background: var(--ne-accent, #7a8a78);
  border-color: var(--ne-accent, #7a8a78);
  color: #fff;
}
.ne-link-prompt button:hover { filter: brightness(0.97); }
