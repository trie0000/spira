/* \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 Floating widgets \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */

/* Drag handle (viewport-fixed so it floats above any host stacking context) */
.ne-drag-handle {
  position: fixed;
  width: 18px;
  align-items: center;
  justify-content: center;
  color: var(--ne-faint);
  cursor: grab;
  border-radius: var(--ne-radius);
  background: transparent;
  z-index: var(--ne-z-floating);
  user-select: none;
}
.ne-drag-handle:hover {
  background: var(--ne-surface);
  color: var(--ne-muted);
}
.ne-drag-handle:active { cursor: grabbing; }

.ne-block-dragging { opacity: 0.4; }

.ne-drop-line {
  height: 2px;
  background: var(--ne-accent);
  margin: 1px 0;
  border-radius: 1px;
  pointer-events: none;
}

/* Slash menu */
.ne-slash {
  position: fixed;
  z-index: var(--ne-z-floating);
  display: none;
  width: 280px;
  max-height: 360px;
  overflow-y: auto;
  background: var(--ne-bg);
  color: var(--ne-text);
  border: 1px solid var(--ne-border-strong);
  border-radius: var(--ne-radius-lg);
  box-shadow: var(--ne-shadow);
  padding: 4px;
  font-size: var(--ne-font-size);
  line-height: 1.4;
}
.ne-slash.on { display: block; }
.ne-slash-section {
  padding: 6px 8px 2px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--ne-faint);
}
.ne-slash-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: var(--ne-radius);
  cursor: pointer;
}
.ne-slash-item:hover,
.ne-slash-item.sel { background: var(--ne-accent-soft); }

.ne-slash-icon {
  width: 24px;
  height: 24px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 600;
  color: var(--ne-text);
  background: var(--ne-surface);
  border: 1px solid var(--ne-border);
  border-radius: var(--ne-radius);
}
.ne-slash-body { flex: 1; min-width: 0; }
.ne-slash-name { font-size: var(--ne-font-size); color: var(--ne-text); line-height: 1.2; }
.ne-slash-desc { font-size: 11px; color: var(--ne-muted); margin-top: 1px; }
.ne-slash-kbd {
  flex-shrink: 0;
  font-family: var(--ne-mono);
  font-size: 10px;
  color: var(--ne-muted);
  background: var(--ne-surface);
  border: 1px solid var(--ne-border);
  border-radius: 2px;
  padding: 1px 5px;
}

/* Floating selection toolbar */
.ne-ftb {
  position: fixed;
  z-index: var(--ne-z-floating);
  display: none;
  transform: translateX(-50%);
  padding: 2px;
  background: var(--ne-bg);
  border: 1px solid var(--ne-border-strong);
  border-radius: var(--ne-radius);
  box-shadow: var(--ne-shadow);
  gap: 1px;
}
.ne-ftb.on { display: flex; }
.ne-ftb-b {
  appearance: none;
  background: transparent;
  border: 0;
  padding: 4px 8px;
  cursor: pointer;
  font-size: var(--ne-font-size);
  color: var(--ne-text);
  border-radius: 2px;
  line-height: 1;
}
.ne-ftb-b:hover { background: var(--ne-surface); }

/* \u7A7A\u6BB5\u843D (round-trip \u3067\u4FDD\u6301\u3055\u308C\u305F Enter Enter \u306B\u3088\u308B\u7A7A\u884C)\u3002
   zero-width space \u3092 1 \u6587\u5B57\u542B\u3080\u305F\u3081 cursor \u304C\u78BA\u5B9F\u306B\u4F4D\u7F6E\u6C7A\u3081\u3067\u304D\u3001
   \u6700\u4F4E\u9650\u306E\u9AD8\u3055\u3092\u4E0E\u3048\u3066 margin \u3060\u3051\u3067\u57CB\u3082\u308C\u306A\u3044\u3088\u3046\u306B\u3059\u308B\u3002 */
.ne-blank-p {
  min-height: 1em;
}

/* \u30D8\u30C3\u30C0\u884C\u306B\u5909\u63DB\u3055\u308C\u305F\u30C6\u30FC\u30D6\u30EB\u306E\u5148\u982D\u884C (\u56FA\u5B9A\u8272)\u3002
   .ne-table-has-header \u30AF\u30E9\u30B9\u304C\u4ED8\u3044\u3066\u3044\u308B\u6642\u306E\u307F tr:first-child \u3092\u5F37\u8ABF\u3002 */
.ne-prose .ne-table.ne-table-has-header > tbody > tr:first-child > td,
.ne-prose .ne-table.ne-table-has-header > tr:first-child > td {
  background: var(--ne-accent-soft);
  font-weight: 600;
  color: var(--ne-text);
}

/* \u884C/\u5217\u30CF\u30F3\u30C9\u30EB\u306E\u30C9\u30E9\u30C3\u30B0\u4E2D\u3001\u5165\u308C\u66FF\u3048\u5148\u3068\u306A\u308B\u884C/\u5217\u306E\u30BB\u30EB\u3092\u30CF\u30A4\u30E9\u30A4\u30C8\u3002 */
.ne-prose .ne-table td.ne-tbl-swap-target,
.ne-prose .ne-table th.ne-tbl-swap-target {
  background: var(--ne-accent-soft);
  box-shadow: inset 0 0 0 2px var(--ne-accent);
}

/* \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 Link insert prompt \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
/* \u30B9\u30E9\u30C3\u30B7\u30E5\u30E1\u30CB\u30E5\u30FC\u304B\u3089 /link \u3067\u958B\u304F\u5C0F\u578B\u30D5\u30A9\u30FC\u30E0\u3002
   \u30AD\u30E3\u30EC\u30C3\u30C8\u8FD1\u304F\u306B\u30D5\u30ED\u30FC\u30C8\u3057\u3001URL + \u8868\u793A\u6587\u5B57\u3092\u5165\u529B\u3057\u3066 Enter \u3067\u633F\u5165\u3002 */
.ne-link-prompt {
  width: 340px;
  background: var(--ne-paper, #fff);
  border: 1px solid var(--ne-border-strong, rgba(15, 15, 15, 0.18));
  border-radius: 8px;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.16);
  padding: 12px;
  font-family: inherit;
  font-size: 13px;
  color: var(--ne-ink, #2d2d2a);
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.ne-link-prompt-row {
  display: grid;
  grid-template-columns: 64px 1fr;
  align-items: center;
  gap: 8px;
}
.ne-link-prompt-row label {
  font-size: 12px;
  color: var(--ne-muted, rgba(0,0,0,0.55));
  text-align: right;
}
.ne-link-prompt input {
  width: 100%;
  padding: 6px 8px;
  border: 1px solid var(--ne-border, rgba(15,15,15,0.14));
  border-radius: 4px;
  font: inherit;
  background: var(--ne-paper, #fff);
  color: var(--ne-ink, #2d2d2a);
  outline: none;
  box-sizing: border-box;
}
.ne-link-prompt input:focus {
  border-color: var(--ne-accent, #7a8a78);
  box-shadow: 0 0 0 1px var(--ne-accent-soft, rgba(122,138,120,0.2));
}
.ne-link-prompt-actions {
  display: flex;
  justify-content: flex-end;
  gap: 6px;
  margin-top: 2px;
}
.ne-link-prompt button {
  padding: 5px 12px;
  border-radius: 4px;
  border: 1px solid var(--ne-border, rgba(15,15,15,0.14));
  background: var(--ne-paper, #fff);
  color: var(--ne-ink, #2d2d2a);
  font: inherit;
  cursor: pointer;
  font-size: 12px;
}
.ne-link-prompt button.ne-link-ok {
  background: var(--ne-accent, #7a8a78);
  border-color: var(--ne-accent, #7a8a78);
  color: #fff;
}
.ne-link-prompt button:hover { filter: brightness(0.97); }
